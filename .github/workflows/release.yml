name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Package & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Recall is a single-file app — package the app + its zero-dep server.
      - name: Create release zip
        run: |
          tag="${{ github.ref_name }}"
          dest="recall-$tag"
          mkdir "$dest"
          cp index.html serve.js README.md "$dest"/
          zip -r "$dest.zip" "$dest"
          echo "Packaged: $dest.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Recall ${{ github.ref_name }}"
          files: "recall-${{ github.ref_name }}.zip"
          generate_release_notes: true

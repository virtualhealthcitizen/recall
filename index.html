  /* ----- Rich text editor ----- */
  function buildRTE(initialHTML, placeholder, withBlank, imageDeck) {
    const wrap = el("div", "rte");
    const bar = el("div", "rte-bar");
    const cmds = [
      ["bold", "<b>B</b>", "Bold (Ctrl+B)"], ["italic", "<i>I</i>", "Italic (Ctrl+I)"],
      ["underline", "<u>U</u>", "Underline (Ctrl+U)"], ["strikeThrough", "<s>S</s>", "Strikethrough (Ctrl+Shift+S)"],
      ["sep"], ["insertUnorderedList", "•", "Bullet list (Ctrl+Shift+8)"], ["insertOrderedList", "1.", "Numbered list (Ctrl+Shift+7)"],
      ["indent", "⇥", "Indent (Ctrl+])"], ["outdent", "⇤", "Outdent (Ctrl+[)"],
      ["sep"],
      ["justifyLeft", '<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 4h12M2 8h7M2 12h10"/></svg>', "Align left"],
      ["justifyCenter", '<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 4h12M4.5 8h7M3 12h10"/></svg>', "Align center"],
      ["justifyRight", '<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 4h12M7 8h7M4 12h10"/></svg>', "Align right"],
      ["sep"], ["removeFormat", "⨯", "Clear formatting"],
    ];
    const area = el("div", "rte-area");
    area.contentEditable = "true";
    area.setAttribute("data-placeholder", placeholder || "");
    area.innerHTML = sanitize(initialHTML || "");
    // Blanks loaded for editing need the same caret guards as freshly-made ones,
    // so typing beside them never leaks the yellow styling onto the new text.
    if (withBlank) area.querySelectorAll(".blank").forEach(guardBlank);
    // Resolve <img data-img-id> references to real sources for display.
    hydrateImages(area);

    // Paste images straight from the clipboard (e.g. copied from a web browser).
    if (imageDeck) area.addEventListener("paste", e => {
      const files = e.clipboardData ? [...e.clipboardData.files].filter(f => /^image\//.test(f.type)) : [];
      if (!files.length) return;            // not an image paste — let text paste through
      e.preventDefault();
      const sel = window.getSelection();
      let r = sel.rangeCount ? sel.getRangeAt(0).cloneRange() : null;
      (async () => {
        for (const file of files) {
          const dataURL = await readFileAsDataURL(file);
          const img = makeImgEl(addDeckImage(imageDeck, dataURL), dataURL);
          insertImageAt(area, img, r);
          r = document.createRange(); r.setStartAfter(img); r.collapse(true);
          persistImage();
        }
      })();
    });

    // ---- Resize images by dragging their bottom-right corner. Aspect ratio is
    // preserved because we only ever set the width (height stays auto). The chosen
    // width is an inline style, so it's saved with the card and shown when studying. ----
    const IMG_GRIP = 16;
    const onImgGrip = (img, x, y) => { const r = img.getBoundingClientRect(); return x >= r.right - IMG_GRIP && y >= r.bottom - IMG_GRIP; };
    area.addEventListener("mousemove", e => {
      if (area._imgResizing) return;
      const img = e.target.closest ? e.target.closest("img.rte-img") : null;
      const c = (img && area.contains(img)) ? (onImgGrip(img, e.clientX, e.clientY) ? "nwse-resize" : "default") : "";
      if (area.style.cursor !== c) area.style.cursor = c; // on the area; never saved with content
    });
    area.addEventListener("mousedown", e => {
      const img = e.target.closest ? e.target.closest("img.rte-img") : null;
      if (!img || !area.contains(img) || !onImgGrip(img, e.clientX, e.clientY)) return;
      e.preventDefault();
      area._imgResizing = true;
      const startX = e.clientX, startW = img.getBoundingClientRect().width, maxW = area.clientWidth - 4;
      const onMove = ev => {
        ev.preventDefault();
        const w = Math.round(Math.max(40, Math.min(startW + (ev.clientX - startX), maxW)));
        img.style.width = w + "px"; img.style.height = "auto"; img.style.maxHeight = "none";
      };
      const onUp = () => {
        area._imgResizing = false; area.style.cursor = "";
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
      };
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });

    // ---- Undo / redo. The browser's native undo stack can't track the editor's
    // direct DOM edits (blanks, inline code, code blocks, seeded lists), so we keep
    // our own: a MutationObserver snapshots HTML + caret after each change, and
    // Ctrl+Z / Ctrl+Y restore from the stack. ----
    const history = [{ html: area.innerHTML, sel: null }];
    let hpos = 0, idleTimer = null, maxTimer = null, mo = null;
    function commitHistory() {
      clearTimeout(idleTimer); clearTimeout(maxTimer); idleTimer = maxTimer = null;
      const html = area.innerHTML;
      if (html === history[hpos].html) { history[hpos].sel = saveRteSel(area); return; }
      history.splice(hpos + 1);              // dropping any redo branch
      history.push({ html, sel: saveRteSel(area) });
      if (history.length > 200) history.shift();
      hpos = history.length - 1;
    }
    function scheduleCommit() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(commitHistory, 250);      // commit on a typing pause
      if (!maxTimer) maxTimer = setTimeout(commitHistory, 900); // ...or mid-burst
    }
    function applyHistory() {
      mo.disconnect();                        // our own writes must not be recorded
      area.innerHTML = history[hpos].html;
      if (withBlank) area.querySelectorAll(".blank").forEach(guardBlank);
      history[hpos].html = area.innerHTML;    // re-sync: guardBlank may have added a
                                              // guard node, so keep snapshot == DOM or
                                              // the next commit mistakes it for an edit
      area.focus();
      restoreRteSel(area, history[hpos].sel);
      mo.observe(area, { subtree: true, childList: true, characterData: true, attributes: true });
    }
    function undo() { commitHistory(); if (hpos > 0) { hpos--; applyHistory(); } }
    function redo() { if (hpos < history.length - 1) { hpos++; applyHistory(); } }
    mo = new MutationObserver(scheduleCommit);
    mo.observe(area, { subtree: true, childList: true, characterData: true, attributes: true });

    // keyboard shortcuts for formatting (conventional keys)
    area.addEventListener("keydown", e => {
      // Escape exits inline code without unwrapping (no Ctrl needed)
      if (e.key === "Escape" && exitInlineCode(area)) { e.preventDefault(); return; }
      const ctrl = e.ctrlKey || e.metaKey;
      if (!ctrl) return;
      const key = e.key.toLowerCase();
      const shift = e.shiftKey;
      // Undo (Ctrl+Z) / Redo (Ctrl+Y or Ctrl+Shift+Z) — handled by our own stack
      // so the custom DOM edits revert too.
      if (key === "z" && !shift) { e.preventDefault(); undo(); return; }
      if (key === "y" || (key === "z" && shift)) { e.preventDefault(); redo(); return; }
      let cmd = null;
      if (key === "b" && !shift) cmd = "bold";
      else if (key === "i" && !shift) cmd = "italic";
      else if (key === "u" && !shift) cmd = "underline";
      else if (key === "s" && shift) cmd = "strikeThrough";
      else if (key === "]") cmd = "indent";
      else if (key === "[") cmd = "outdent";
      // Shift+8/7 report e.key as "*"/"&" on US layouts, so match the physical key.
      else if (shift && (e.code === "Digit8" || key === "8" || key === "*")) cmd = "insertUnorderedList";
      else if (shift && (e.code === "Digit7" || key === "7" || key === "&")) cmd = "insertOrderedList";
      if (cmd) { e.preventDefault(); runEditCommand(area, cmd); }
      if (key === "e" && !shift) { e.preventDefault(); toggleInlineCode(area); }
      if (key === "e" && shift) { e.preventDefault(); insertCodeBlock(area); }
      if (withBlank && key === "b" && shift) { e.preventDefault(); makeBlank(area); }
    });

    cmds.forEach(c => {
      if (c[0] === "sep") { bar.appendChild(el("span", "sep")); return; }
      const b = el("button", null, c[1]); b.type = "button"; b.title = c[2];
      b.onmousedown = e => e.preventDefault();
      b.onclick = () => runEditCommand(area, c[0]);
      bar.appendChild(b);
    });
    // Code snippet buttons
    bar.appendChild(el("span", "sep"));
    const codeBtn = el("button", null, "<code>&lt;/&gt;</code>"); codeBtn.type = "button"; codeBtn.title = "Inline code (Ctrl+E · Esc to exit)";
    codeBtn.onmousedown = e => e.preventDefault();
    codeBtn.onclick = () => { area.focus(); toggleInlineCode(area); };
    bar.appendChild(codeBtn);
    const blockBtn = el("button", null, "{…}"); blockBtn.type = "button"; blockBtn.title = "Code block (Ctrl+Shift+E)";
    blockBtn.onmousedown = e => e.preventDefault();
    blockBtn.onclick = () => { area.focus(); insertCodeBlock(area); };
    bar.appendChild(blockBtn);
    // Insert image (file picker); images can also be pasted from the clipboard.
    if (imageDeck) {
      bar.appendChild(el("span", "sep"));
      const imgBtn = el("button", null, "🖼"); imgBtn.type = "button"; imgBtn.title = "Insert image (or paste from clipboard)";
      imgBtn.onmousedown = e => e.preventDefault();
      imgBtn.onclick = () => {
        const sel = window.getSelection();
        const r = sel.rangeCount && area.contains(sel.getRangeAt(0).commonAncestorContainer) ? sel.getRangeAt(0).cloneRange() : null;
        pickImageInto(area, imageDeck, r);
      };
      bar.appendChild(imgBtn);
    }
    // Code font-size selector
    const sizeWrap = el("div", "code-size-wrap");
    sizeWrap.innerHTML = `<label>px</label>`;
    const sizeSel = el("select", "code-size-sel");
    [11, 12, 13, 14, 15, 16, 18, 20].forEach(s => {
      const o = el("option", null, s); o.value = s;
      if (s === 14) o.selected = true;
      sizeSel.appendChild(o);
    });
    sizeSel.title = "Code font size — click inside a code snippet first";
    sizeSel.onmousedown = e => e.stopPropagation();
    sizeSel.onchange = () => { applyCodeSize(area, sizeSel.value); area.focus(); };
    sizeWrap.prepend(sizeSel);
    bar.appendChild(sizeWrap);
    // New code blocks read their size from here; the selector reflects the block
    // the caret is in. Keeps the toolbar value and the actual block size in sync.
    area._sizeSel = sizeSel;
    const syncSizeSel = () => {
      const sel = window.getSelection();
      const a = sel.rangeCount ? sel.anchorNode : null;
      if (!a || !area.contains(a)) return;
      const node = a.nodeType === 3 ? a.parentElement : a;
      const pre = node && node.closest ? node.closest("pre") : null;
      if (!pre) return;
      const px = parseInt(pre.style.fontSize, 10) || Math.round(parseFloat(getComputedStyle(pre).fontSize));
      const opts = [...sizeSel.options].map(o => +o.value);
      let best = opts[0]; opts.forEach(o => { if (Math.abs(o - px) < Math.abs(best - px)) best = o; });
      sizeSel.value = String(best);
    };
    area.addEventListener("keyup", syncSizeSel);
    area.addEventListener("mouseup", syncSizeSel);

    if (withBlank) {
      bar.appendChild(el("span", "sep"));
      const bb = el("button", "wide", "▭ Blank"); bb.type = "button"; bb.title = "Hide selected text as a blank (Ctrl+Shift+B)";
      bb.onmousedown = e => e.preventDefault();
      bb.onclick = () => makeBlank(area);
      bar.appendChild(bb);
    }
    // click a blank pill to remove it
    area.addEventListener("click", e => {
      const b = e.target.closest(".blank");
      if (b && area.contains(b)) { const t = document.createTextNode(b.textContent); b.replaceWith(t); area.normalize(); }
    });
    // A blank is contenteditable=false, so browsers won't delete it with the
    // keyboard. Make Backspace/Delete next to a blank remove the whole word.
    if (withBlank) area.addEventListener("keydown", e => {
      if (e.key !== "Backspace" && e.key !== "Delete") return;
      const sel = window.getSelection();
      if (!sel.rangeCount || !sel.isCollapsed) return;
      const range = sel.getRangeAt(0);
      if (!area.contains(range.startContainer)) return;
      const blank = adjacentBlank(range, e.key === "Backspace" ? -1 : 1);
      if (blank) { e.preventDefault(); deleteBlank(blank, area); }
    });

    wrap.appendChild(bar); wrap.appendChild(area);
    wrap._getHTML = () => {
      // Store only the lightweight image reference; the data URL lives in the deck.
      const clone = area.cloneNode(true);
      clone.querySelectorAll("img[data-img-id]").forEach(img => img.removeAttribute("src"));
      return sanitize(clone.innerHTML).trim();
    };
    wrap._area = area;
    return wrap;
  }

  function ensureExitNode(node) {
    // Guarantee a text node exists right after an inline element so the cursor
    // can be placed there. Without this, contentEditable traps the cursor inside.
    if (!node.nextSibling || (node.nextSibling.nodeType !== 3)) {
      node.parentNode.insertBefore(document.createTextNode("\u200B"), node.nextSibling);
    }
    return node.nextSibling;
  }

  function guardBlank(span) {
    // Hug an atomic blank with a plain text node on each side so the caret can
    // never land inside it. Without this, typing next to a blank (e.g. changing
    // the answer after marking it) leaks the blank's yellow styling onto the new
    // text in Firefox. Idempotent - skips a side that already has a text node.
    const p = span.parentNode; if (!p) return;
    if (!(span.nextSibling && span.nextSibling.nodeType === 3))
      p.insertBefore(document.createTextNode("\u200B"), span.nextSibling);
    if (!(span.previousSibling && span.previousSibling.nodeType === 3))
      p.insertBefore(document.createTextNode("\u200B"), span);
  }

  function isZeroWidth(n) { return n && n.nodeType === 3 && /^\u200B*$/.test(n.nodeValue); }

  function adjacentBlank(range, dir) {
    // Return the .blank element immediately beside a collapsed caret (dir -1 =
    // before / Backspace, +1 = after / Delete), or null. Only zero-width guard
    // nodes may sit between the caret and the blank.
    const node = range.startContainer, off = range.startOffset;
    if (node.nodeType === 3) {
      const slice = dir < 0 ? node.nodeValue.slice(0, off) : node.nodeValue.slice(off);
      if (/[^\u200B]/.test(slice)) return null; // real text between caret and blank
      let sib = dir < 0 ? node.previousSibling : node.nextSibling;
      while (isZeroWidth(sib)) sib = dir < 0 ? sib.previousSibling : sib.nextSibling;
      return sib && sib.nodeType === 1 && sib.classList.contains("blank") ? sib : null;
    }
    let child = node.childNodes[dir < 0 ? off - 1 : off];
    while (isZeroWidth(child)) child = dir < 0 ? child.previousSibling : child.nextSibling;
    return child && child.nodeType === 1 && child.classList.contains("blank") ? child : null;
  }

  function deleteBlank(blank, area) {
    // Remove the whole atomic blank (the word) and drop the caret where it was.
    const next = blank.nextSibling, prev = blank.previousSibling, parent = blank.parentNode;
    blank.remove();
    const r = document.createRange();
    if (next) r.setStartBefore(next);
    else if (prev) r.setStartAfter(prev);
    else r.setStart(parent, 0);
    r.collapse(true);
    const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
    area.normalize();
  }

  function isEmptyEditable(area) {
    // True when a contentEditable holds no real content. Strips zero-width/space,
    // <br> with ANY attributes (Firefox leaves a bogus <br type="_moz"> placeholder
    // in a focused-but-empty field), and the empty <div>/<p> wrappers browsers add.
    let h = area.innerHTML.replace(/[​\s]/g, "").replace(/<br[^>]*>/gi, "");
    let prev;
    do { prev = h; h = h.replace(/<(div|p)[^>]*><\/\1>/gi, ""); } while (h !== prev);
    return h === "";
  }

  // ---- Selection <-> character-offset (so a caret survives an innerHTML swap
  // during undo/redo). Offsets count text-content characters from the start. ----
  function saveRteSel(area) {
    const sel = window.getSelection();
    if (!sel.rangeCount) return null;
    const r = sel.getRangeAt(0);
    if (!area.contains(r.startContainer) || !area.contains(r.endContainer)) return null;
    const off = (node, o) => { const p = document.createRange(); p.setStart(area, 0); p.setEnd(node, o); return p.cloneContents().textContent.length; };
    try { return { start: off(r.startContainer, r.startOffset), end: off(r.endContainer, r.endOffset) }; }
    catch (_) { return null; }
  }
  function restoreRteSel(area, saved) {
    if (!saved) return;
    const locate = target => {
      let count = 0, n;
      const w = document.createTreeWalker(area, NodeFilter.SHOW_TEXT, null);
      while ((n = w.nextNode())) { const len = n.nodeValue.length; if (count + len >= target) return { node: n, off: target - count }; count += len; }
      return { node: area, off: area.childNodes.length };
    };
    try {
      const s = locate(saved.start), e = locate(saved.end);
      const r = document.createRange(); r.setStart(s.node, s.off); r.setEnd(e.node, e.off);
      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
    } catch (_) {}
  }

  function runEditCommand(area, cmd) {
    area.focus();
    // Guarantee the caret is inside THIS field before acting, so a command never
    // lands in another field (e.g. clicking the back's list button while the caret
    // is still in the front — some browsers don't move it into an empty field).
    const sel0 = window.getSelection();
    if (!sel0.rangeCount || !area.contains(sel0.getRangeAt(0).commonAncestorContainer)) {
      const r0 = document.createRange(); r0.selectNodeContents(area); r0.collapse(false);
      sel0.removeAllRanges(); sel0.addRange(r0);
    }
    // Firefox treats insertUnordered/OrderedList as a no-op on a truly empty
    // editor, so the first bullet never appears. Seed the list ourselves.
    if ((cmd === "insertUnorderedList" || cmd === "insertOrderedList") && isEmptyEditable(area)) {
      const list = document.createElement(cmd === "insertOrderedList" ? "ol" : "ul");
      const li = list.appendChild(document.createElement("li"));
      li.appendChild(document.createElement("br"));
      area.innerHTML = "";
      area.appendChild(list);
      const r = document.createRange(); r.setStart(li, 0); r.collapse(true);
      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
      return;
    }
    document.execCommand(cmd, false, null);
  }

  function exitInlineCode(area) {
    // Move cursor out of the nearest inline <code> (not <pre><code>).
    const sel = window.getSelection();
    if (!sel.rangeCount) return false;
    const anchor = sel.anchorNode?.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
    const code = anchor?.closest?.("code");
    if (!code || code.closest("pre") || !area.contains(code)) return false;
    const exit = ensureExitNode(code);
    const r = document.createRange();
    r.setStart(exit, exit.length);
    r.collapse(true);
    sel.removeAllRanges(); sel.addRange(r);
    return true;
  }

  function toggleInlineCode(area) {
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    if (!area.contains(range.commonAncestorContainer)) return;
    // Check if cursor is already inside an inline <code> (not inside <pre>)
    const anchor = range.commonAncestorContainer.nodeType === 3 ? range.commonAncestorContainer.parentElement : range.commonAncestorContainer;
    const existing = anchor ? anchor.closest("code") : null;
    if (existing && !existing.closest("pre") && area.contains(existing)) {
      // Unwrap: replace <code> with its text content
      const t = document.createTextNode(existing.textContent);
      existing.replaceWith(t);
      area.normalize();
      return;
    }
    if (sel.isCollapsed) {
      // Empty code span for the user to type into; add exit node so they can leave
      const code = document.createElement("code");
      code.textContent = "\u200B";
      range.insertNode(code);
      ensureExitNode(code);
      const r2 = document.createRange();
      r2.selectNodeContents(code);
      sel.removeAllRanges(); sel.addRange(r2);
      return;
    }
    // Wrap selection — place cursor AFTER the code element, not inside
    const text = sel.toString();
    const code = document.createElement("code");
    code.textContent = text;
    range.deleteContents();
    range.insertNode(code);
    const exit = ensureExitNode(code);
    const r2 = document.createRange();
    r2.setStart(exit, exit.length);
    r2.collapse(true);
    sel.removeAllRanges(); sel.addRange(r2);
  }

  function insertCodeBlock(area) {
    const sel = window.getSelection();
    const text = sel.rangeCount && !sel.isCollapsed ? sel.toString() : "";
    const range = sel.rangeCount ? sel.getRangeAt(0) : null;
    const pre = document.createElement("pre");
    const code = document.createElement("code");
    code.textContent = text || "\n";
    pre.appendChild(code);
    // Adopt the toolbar's current size so the new block matches what's shown.
    pre.style.fontSize = (area._sizeSel ? area._sizeSel.value : 14) + "px";
    if (range && area.contains(range.commonAncestorContainer)) {
      if (!sel.isCollapsed) range.deleteContents();
      range.insertNode(pre);
    } else {
      area.appendChild(pre);
    }
    // Place cursor inside
    const r2 = document.createRange();
    r2.selectNodeContents(code);
    r2.collapse(text ? false : true);
    sel.removeAllRanges(); sel.addRange(r2);
    area.focus();
  }

  function applyCodeSize(area, px) {
    const sel = window.getSelection();
    if (!sel.rangeCount) { toast("Click inside a code snippet first"); return; }
    const anchor = sel.anchorNode?.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
    if (!anchor || !area.contains(anchor)) { toast("Click inside a code snippet first"); return; }
    const target = anchor.closest("pre") || anchor.closest("code");
    if (!target || !area.contains(target)) { toast("Click inside a code snippet first"); return; }
    target.style.fontSize = px + "px";
  }

  function makeBlank(area) {
    const sel = window.getSelection();
    if (!sel.rangeCount || sel.isCollapsed) { toast("Select the word(s) to hide first"); return; }
    const range = sel.getRangeAt(0);
    if (!area.contains(range.commonAncestorContainer)) { toast("Select text inside the box"); return; }
    const text = sel.toString();
    if (!text.trim()) return;
    const span = document.createElement("span");
    span.className = "blank";
    span.setAttribute("data-answer", text);
    span.setAttribute("contenteditable", "false"); // atomic: cursor can't enter, prevents yellow leak
    span.textContent = text;
    range.deleteContents();
    range.insertNode(span);
    // Give the caret a plain-text home on each side of the blank, then drop it
    // just past the blank so typing resumes in normal (non-yellow) text.
    guardBlank(span);
    const after = span.nextSibling; // guaranteed text node by guardBlank
    const off = after.nodeValue === "​" ? after.nodeValue.length : 0;
    const afterRange = document.createRange();
    afterRange.setStart(after, off);
    afterRange.collapse(true);
    sel.removeAllRanges();
    sel.addRange(afterRange);
    area.focus();
  }

  /* ----- Card editor ----- */
  function openCardEditor(deckId, cardId, presetType, onSaved) {
    const deck = deckById(deckId);
    const editing = cardId ? deck.cards.find(c => c.id === cardId) : null;
    let type = editing ? editing.type : (presetType || "basic");

    const n = el("div");
    n.innerHTML = `
    <div class="modal-head">
      <h2>${editing ? "Edit card" : "New card"}</h2>
      <div style="margin-top:12px" class="seg" id="typeSeg">
        <button data-type="basic" class="${type === "basic" ? "on" : ""}">Basic</button>
        <button data-type="fill" class="${type === "fill" ? "on" : ""}">Fill-in-the-blank</button>
      </div>
    </div>
    <div class="modal-body" id="cardBody"></div>
    <div class="modal-foot">
      <button class="btn" data-close>Cancel</button>
      <button class="btn btn-primary" id="cardSave">${editing ? "Save changes" : "Add card"}</button>
    </div>`;
    openModal(n, { resizable: true });

    const body = n.querySelector("#cardBody");
    let frontRTE, backRTE, fillRTE;

    function drawBody() {
      body.innerHTML = "";
      if (type === "basic") {
        const f1 = el("div", "field"); f1.appendChild(el("label", null, "Front (question)"));
        frontRTE = buildRTE(editing && editing.type === "basic" ? editing.front : "", "The prompt you'll see first…", false, deck);
        f1.appendChild(frontRTE); body.appendChild(f1);
        const f2 = el("div", "field"); f2.appendChild(el("label", null, "Back (answer)"));
        backRTE = buildRTE(editing && editing.type === "basic" ? editing.back : "", "The answer, revealed on flip…", false, deck);
        f2.appendChild(backRTE); body.appendChild(f2);
      } else {
        const f = el("div", "field"); f.appendChild(el("label", null, "Sentence"));
        fillRTE = buildRTE(editing && editing.type === "fill" ? editing.prompt : "", "Type a sentence, then select a word and press Blank…", true, deck);
        f.appendChild(fillRTE); body.appendChild(f);
        body.appendChild(el("div", "hint",
          `Select any word and hit <b>▭ Blank</b> (or <b>Ctrl+Shift+B</b>) to hide it. For alternatives, select text like <code>color|colour</code> before blanking — any of them counts as correct. Click a blank to remove it.`));
      }
      focusFront();
    }
    function focusFront() {
      // Land the caret on the card's front field (the Sentence box for fill cards)
      // as soon as the editor opens, at the end of any existing content.
      const area = (type === "basic" ? frontRTE : fillRTE)?._area;
      if (!area) return;
      setTimeout(() => {
        area.focus();
        const r = document.createRange();
        r.selectNodeContents(area); r.collapse(false);
        const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
      }, 30);
    }
    drawBody();

    n.querySelectorAll("#typeSeg button").forEach(b => b.onclick = () => {
      if (editing) { toast("Card type can't change after creation"); return; }
      type = b.dataset.type;
      n.querySelectorAll("#typeSeg button").forEach(x => x.classList.toggle("on", x.dataset.type === type));
      drawBody();
    });

    n.querySelector("#cardSave").onclick = () => {
      if (type === "basic") {
        const front = frontRTE._getHTML(), back = backRTE._getHTML();
        const has = h => plainText(h) || /<img/i.test(h);   // text or an image counts
        if (!has(front)) { toast("Add a front/question"); return; }
        if (!has(back)) { toast("Add a back/answer"); return; }
        if (editing) { editing.front = front; editing.back = back; }
        else deck.cards.push({ id: uid(), type: "basic", front, back, srs: { due: Date.now(), interval: 0, ease: 2.5, reps: 0, lapses: 0 } });
      } else {
        const prompt = fillRTE._getHTML();
        if (!plainText(prompt) && !/<img/i.test(prompt)) { toast("Write a sentence"); return; }
        if (!/class="blank"/.test(prompt)) { toast("Mark at least one blank"); return; }
        if (editing) editing.prompt = prompt;
        else deck.cards.push({ id: uid(), type: "fill", prompt, srs: { due: Date.now(), interval: 0, ease: 2.5, reps: 0, lapses: 0 } });
      }
      pruneDeckImages(deck);   // drop any images no longer referenced by a card
      closeModal(); render(); toast(editing ? "Card saved" : "Card added");
      if (onSaved) onSaved();  // e.g. refresh the card being studied
    };
  }

  /* =========================================================================
     Study mode + spaced repetition (SM-2 lite)
     ========================================================================= */
  const study = { queue: [], index: 0, phase: "question", reviewed: 0, againCount: 0, scope: null };

  function gatherCards(scope, mode) {
    let cards = [];
    if (scope.type === "deck") { const d = deckById(scope.id); if (d) cards = d.cards.slice(); }
    else if (scope.type === "subject") decksInSubject(scope.id).forEach(d => cards.push(...d.cards));
    else state.decks.forEach(d => cards.push(...d.cards));
    if (mode === "due") cards = cards.filter(isDue);
    for (let i = cards.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [cards[i], cards[j]] = [cards[j], cards[i]]; }
    return cards;
  }

  function startStudy(scope, mode) {
    const cards = gatherCards(scope, mode);
    if (!cards.length) { toast(mode === "due" ? "Nothing due right now — try Cram" : "No cards to study"); return; }
    study.queue = cards; study.index = 0; study.phase = "question"; study.reviewed = 0; study.againCount = 0; study.scope = scope; study.mode = mode;

    let label = "All decks";
    if (scope.type === "deck") label = deckById(scope.id)?.name || "Deck";
    else if (scope.type === "subject") label = (ui.subjectId === "__uncat" ? "Uncategorized" : subjectById(scope.id)?.name) || "Subject";
    $("#studyScope").textContent = `${label} · ${mode === "cram" ? "cram" : "due"} · ${cards.length} card${cards.length === 1 ? "" : "s"}`;
    $("#study").classList.add("open");
    renderStudyCard();
  }

  function endStudy() {
    $("#study").classList.remove("open");
    $("#studyStage").innerHTML = ""; $("#studyControls").innerHTML = "";
    render();
  }

  // Edit the card currently being studied; on save, re-render it in place. The
  // editor mutates the same card object that's in the study queue, so the updated
  // content shows immediately (and is persisted) without disrupting the session.
  function editCurrentStudyCard() {
    if (!$("#study").classList.contains("open")) return;
    const card = study.queue[study.index];
    if (!card) return;
    const deck = state.decks.find(d => d.cards.some(c => c.id === card.id));
    if (!deck) { toast("This card's deck is no longer available."); return; }
    openCardEditor(deck.id, card.id, null, () => { if ($("#study").classList.contains("open")) renderStudyCard(); });
  }

  function renderProgress() {
    const total = study.queue.length;
    const done = Math.min(study.index, total);
    $("#studyCount").textContent = `${done} / ${total}`;
    $("#studyProgress").style.width = total ? `${(done / total) * 100}%` : "0%";
  }

  function renderStudyCard() {
    renderProgress();
    const stage = $("#studyStage"), controls = $("#studyControls");
    stage.innerHTML = ""; controls.innerHTML = "";

    if (study.index >= study.queue.length) return renderSessionDone();
    const card = study.queue[study.index];
    study.phase = "question";
    study._activeInput = null;

    const wrap = el("div", "card-wrap");
    wrap.appendChild(el("div", "stack-layer l2"));
    wrap.appendChild(el("div", "stack-layer l1"));

    if (card.type === "basic") {
      const fc = el("div", "flashcard");
      fc.innerHTML = `<div class="flashcard-inner">
        <div class="face front"><div class="face-label">Question</div><div class="face-content">${sanitize(card.front)}</div><div class="tap-hint">tap or press Space to flip</div></div>
        <div class="face back"><div class="face-label">Answer</div><div class="face-content small">${sanitize(card.back)}</div></div>
      </div>`;
      hydrateImages(fc);
      fc.onclick = () => { if (study.phase === "question") flipCard(); };
      wrap.appendChild(fc);
      stage.appendChild(wrap);
      controls.appendChild(bigAction("Show answer", flipCard));
    } else {
      const fc = el("div", "fill-card");
      const promptHTML = buildFillPrompt(card.prompt);
      fc.appendChild(promptHTML.node);
      const keyEl = el("div", "answer-key"); keyEl.style.display = "none"; keyEl.id = "answerKey";
      fc.appendChild(keyEl);
      wrap.appendChild(fc);
      stage.appendChild(wrap);
      setTimeout(() => promptHTML.inputs[0] && promptHTML.inputs[0].focus(), 30);
      study._fillInputs = promptHTML.inputs;
      study._activeInput = promptHTML.inputs[0] || null;
      const check = bigAction("Check answer", () => gradeFill(card));
      controls.appendChild(check);
      controls.appendChild(el("div", "study-count", "Press Enter to check."));
      promptHTML.inputs.forEach(inp => inp.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); gradeFill(card); } }));
    }
  }

  function buildFillPrompt(html) {
    const container = el("div", "fill-prompt");
    container.innerHTML = sanitize(html);
    hydrateImages(container);
    const inputs = [];
    container.querySelectorAll(".blank").forEach(span => {
      const answer = span.getAttribute("data-answer") || span.textContent;
      const input = el("input", "fill-input");
      input.type = "text"; input.setAttribute("data-answer", answer); input.autocomplete = "off"; input.spellcheck = false;
      const longest = answer.split("|").reduce((a, b) => a.length >= b.length ? a : b, "");
      input.style.width = Math.max(90, longest.length * 16) + "px";
      span.replaceWith(input);
      inputs.push(input);
    });
    return { node: container, inputs };
  }

  // Forgiving answer matching: ignore case, surrounding/repeated whitespace,
  // punctuation, and accents — so a learner isn't marked wrong for "el nucleo"
  // vs "El nucleo!". Returns a normalized string for comparison.
  function normalizeAnswer(s) {
    return (s || "")
      .normalize("NFD").replace(/[̀-ͯ]/g, "") // drop diacritics: "café" -> "cafe"
      .toLowerCase()
      .replace(/[^\p{L}\p{N}\s]/gu, " ")                // punctuation/symbols -> space
      .replace(/\s+/g, " ")                             // collapse whitespace
      .trim();
  }
  // Levenshtein distance — used to forgive the occasional typo.
  function editDistance(a, b) {
    const m = a.length, n = b.length;
    if (!m) return n; if (!n) return m;
    let prev = Array.from({ length: n + 1 }, (_, j) => j);
    for (let i = 1; i <= m; i++) {
      const cur = [i];
      for (let j = 1; j <= n; j++) {
        cur[j] = a[i - 1] === b[j - 1] ? prev[j - 1] : 1 + Math.min(prev[j - 1], prev[j], cur[j - 1]);
      }
      prev = cur;
    }
    return prev[n];
  }
  // True if the typed value matches any accepted answer after normalization, with a
  // small length-scaled typo tolerance (none for very short answers, to stay strict
  // where a single letter changes the word).
  function answerMatches(acceptedRaw, value) {
    const v = normalizeAnswer(value);
    if (!v) return false;
    for (const ans of acceptedRaw) {
      const a = normalizeAnswer(ans);
      if (!a) continue;
      if (a === v) return true;
      const tol = a.length >= 8 ? 2 : a.length >= 5 ? 1 : 0;
      if (tol && editDistance(a, v) <= tol) return true;
    }
    return false;
  }

  function gradeFill(card) {
    if (study.phase !== "question") return;
    const inputs = study._fillInputs || [];
    let allOk = true; const misses = [];
    inputs.forEach(inp => {
      const accepted = inp.getAttribute("data-answer").split("|");
      const ok = answerMatches(accepted, inp.value);
      inp.classList.toggle("correct", ok);
      inp.classList.toggle("incorrect", !ok);
      inp.disabled = true;
      if (!ok) { allOk = false; misses.push(inp.getAttribute("data-answer").split("|")[0]); }
    });
    const key = $("#answerKey");
    key.style.display = "block";
    key.innerHTML = allOk
      ? `<span class="ok">✓ All correct</span>`
      : `Answer${misses.length > 1 ? "s" : ""}: ${misses.map(m => `<b>${escapeAttr(m)}</b>`).join(", ")}`;
    study.phase = "answer";
    showRatings(card, allOk);
  }

  function flipCard() {
    if (study.phase !== "question") return;
    const fc = $("#studyStage .flashcard");
    if (fc) fc.classList.add("flipped");
    study.phase = "answer";
    showRatings(study.queue[study.index], null);
  }

  function bigAction(label, fn) {
    const wrap = el("div", "big-action");
    const b = el("button", "btn btn-primary", label); b.style.padding = "12px 28px"; b.style.fontSize = "15px";
    b.onclick = fn; wrap.appendChild(b); return wrap;
  }

  function showRatings(card, autoGood) {
    const controls = $("#studyControls");
    controls.innerHTML = "";
    const row = el("div", "rate-row");
    const defs = [
      ["again", "Again", "1", 0], ["hard", "Hard", "2", 1],
      ["good", "Good", "3", 2], ["easy", "Easy", "4", 3],
    ];
    defs.forEach(([cls, lbl, key, grade]) => {
      const b = el("button", `rate ${cls}`, `<span>${lbl}</span><small>${key} · ${nextLabel(card, grade)}</small>`);
      b.onclick = () => rateCard(card, grade);
      row.appendChild(b);
    });
    controls.appendChild(row);
    const hint = el("div", "study-count", autoGood === false ? "Some blanks missed — be honest with your rating." : "Press 1–4, or click.");
    controls.appendChild(hint);
  }

  function nextLabel(card, grade) {
    const preview = previewInterval(card.srs, grade);
    if (preview === 0) return "soon";
    if (preview < 1) return "<1d";
    return preview + "d";
  }
  function previewInterval(s, grade) {
    if (grade === 0) return 0;
    if (s.reps === 0) return grade === 1 ? 1 : grade === 2 ? 1 : 4;
    if (s.reps === 1) return grade === 1 ? 3 : grade === 2 ? 6 : 10;
    const mult = grade === 1 ? 1.2 : grade === 2 ? s.ease : s.ease * 1.3;
    return Math.max(1, Math.round(s.interval * mult));
  }

  function rateCard(card, grade) {
    const s = card.srs;
    if (grade === 0) {
      s.reps = 0; s.lapses++; s.interval = 0; s.ease = Math.max(1.3, s.ease - 0.2); s.due = Date.now();
      study.queue.push(card); study.againCount++;
    } else {
      s.interval = previewInterval(s, grade);
      if (grade === 1) s.ease = Math.max(1.3, s.ease - 0.15);
      if (grade === 3) s.ease = s.ease + 0.15;
      s.reps++; s.due = Date.now() + s.interval * DAY;
    }
    study.reviewed++;
    study.index++;
    persist(); // save spaced-repetition progress as you go
    renderStudyCard();
  }

  function renderSessionDone() {
    renderProgress();
    const stage = $("#studyStage"), controls = $("#studyControls");
    const acc = study.reviewed ? Math.round(((study.reviewed - study.againCount) / study.reviewed) * 100) : 0;
    stage.innerHTML = `<div class="session-done">
      <div class="em">🎉</div>
      <div class="big">Session complete</div>
      <p class="page-sub">You reviewed <b>${study.reviewed}</b> card${study.reviewed === 1 ? "" : "s"} · ${study.againCount} marked again · ${acc}% first-try.</p>
    </div>`;
    controls.innerHTML = "";
    const b = el("button", "btn btn-primary", "Back to deck"); b.style.padding = "12px 26px";
    b.onclick = endStudy; controls.appendChild(b);
  }

  /* keyboard shortcuts in study */
  document.addEventListener("keydown", e => {
    if (!$("#study").classList.contains("open")) return;
    if ($("#modalRoot").classList.contains("open")) return; // editing over study — let the modal handle keys
    if (e.key === "Escape") { endStudy(); return; }
    const card = study.queue[study.index];
    if (!card) return;
    if (study.phase === "question") {
      if (card.type === "basic" && e.code === "Space") { e.preventDefault(); flipCard(); }
      else if (card.type === "fill" && e.key === "Enter") { e.preventDefault(); gradeFill(card); } // Space types into the blank, so Enter checks
    } else if (study.phase === "answer") {
      if (["1", "2", "3", "4"].includes(e.key)) { e.preventDefault(); rateCard(card, parseInt(e.key, 10) - 1); }
    }
  });

  // Remember the blank being edited the instant the window loses focus — element
  // blur/focus events don't fire on a window switch, but the input is still the
  // activeElement at that moment.
  window.addEventListener("blur", () => {
    const ae = document.activeElement;
    if (ae && ae.classList && ae.classList.contains("fill-input")) study._activeInput = ae;
  });
  // Returning from another window/tab often drops focus from the blank the user was
  // filling in. Put it back where they left off (caret at the end of the value).
  window.addEventListener("focus", () => {
    if (!$("#study").classList.contains("open") || study.phase !== "question") return;
    const inp = study._activeInput;
    if (!inp || !inp.isConnected || inp.disabled) return;
    setTimeout(() => {
      const ae = document.activeElement;
      if (ae && ae.classList && ae.classList.contains("fill-input")) return; // browser already restored it
      inp.focus();
      const n = inp.value.length; try { inp.setSelectionRange(n, n); } catch (_) {}
    }, 0);
  });

  /* =========================================================================
     Export / Import
     ========================================================================= */
  // Export: let the user browse and choose where to save via the File System Access
  // API (Chromium). Falls back to a normal download where that API is unavailable or
  // blocked (e.g. Firefox), in which case the browser's download settings decide the
  // location — turn on Firefox's "Always ask you where to save files" for a prompt.
  async function exportData() {
    const json = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), ...state }, null, 2);
    // Filename-safe local datetime (YYYY-MM-DD_HH-MM-SS) so multiple exports on the
    // same day don't collide and sort chronologically. Colons/periods from ISO are
    // illegal/awkward in filenames, so build it from local date parts instead.
    const now = new Date();
    const p = (n) => String(n).padStart(2, "0");
    const stamp = `${now.getFullYear()}-${p(now.getMonth() + 1)}-${p(now.getDate())}_${p(now.getHours())}-${p(now.getMinutes())}-${p(now.getSeconds())}`;
    const suggestedName = `recall-flashcards-${stamp}.json`;
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName,
          types: [{ description: "Recall flashcards", accept: { "application/json": [".json"] } }],
        });
        const w = await handle.createWritable();
        await w.write(json); await w.close();
        toast("Exported");
        return;
      } catch (e) {
        if (e && e.name === "AbortError") return;   // user cancelled the Save dialog
        // any other error (e.g. unsupported on file://): fall through to the download
      }
    }
    const blob = new Blob([json], { type: "application/json" });
    const a = el("a"); a.href = URL.createObjectURL(blob);
    a.download = suggestedName;
    a.click(); URL.revokeObjectURL(a.href); toast("Exported to file");
  }
  // Import: let the user browse and pick a file. Uses the File System Access API
  // when available, otherwise the hidden <input type=file> (also a browse dialog).
  async function importPick() {
    if (window.showOpenFilePicker) {
      try {
        const [handle] = await window.showOpenFilePicker({
          multiple: false,
          types: [{ description: "Recall flashcards", accept: { "application/json": [".json"], "text/plain": [".json", ".txt"] } }],
        });
        importData(await handle.getFile());
        return;
      } catch (e) {
        if (e && e.name === "AbortError") return;    // user cancelled
        // fall through to the file input
      }
    }
    $("#fileInput").click();
  }
  function importData(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!Array.isArray(data.decks)) throw new Error("bad");
        confirmModal("Replace current data?", "Importing will replace everything in this session. Export first if you want a backup.", () => {
          state = { subjects: Array.isArray(data.subjects) ? data.subjects : [], decks: data.decks };
          state.decks.forEach(d => d.cards.forEach(c => { if (!c.srs) c.srs = { due: Date.now(), interval: 0, ease: 2.5, reps: 0, lapses: 0 }; }));
          ui.view = "dashboard"; ui.deckId = null; ui.subjectId = null;
          render(); toast("Imported");
        });
      } catch { toast("Couldn't read that file — is it a Recall export?"); }
    };
    reader.readAsText(file);
  }

  /* =========================================================================
     Wiring
     ========================================================================= */
  $("#newDeckBtn").onclick = () => openDeckEditor();
  $("#studyDueBtn").onclick = () => startStudy({ type: "all" }, "due");
  $("#studyExit").onclick = endStudy;
  $("#studyEdit").onclick = editCurrentStudyCard;
  $("#exportBtn").onclick = exportData;
  $("#importBtn").onclick = importPick;
  $("#fileInput").onchange = e => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ""; };
  $("#searchInput").addEventListener("input", e => { ui.search = e.target.value; render(); });
  // Shortcuts (when viewing a deck): B = new basic card, F = new fill-in-the-blank.
  document.addEventListener("keydown", e => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if ($("#study").classList.contains("open") || $("#modalRoot").classList.contains("open")) return;
    const ae = document.activeElement;
    if (ae && (ae.isContentEditable || /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName))) return; // don't fire while typing
    if (ui.view !== "deck" || !deckById(ui.deckId)) return; // only where the buttons live
    const k = e.key.toLowerCase();
    if (k === "b") { e.preventDefault(); openCardEditor(ui.deckId, null, "basic"); }
    else if (k === "f") { e.preventDefault(); openCardEditor(ui.deckId, null, "fill"); }
  });
  $("#themeBtn").onclick = () => {
    const root = document.documentElement;
    root.setAttribute("data-theme", root.getAttribute("data-theme") === "dark" ? "light" : "dark");
  };
  $("#densityBtn").onclick = () => {
    const root = document.documentElement;
    const compact = root.getAttribute("data-density") === "compact";
    root.setAttribute("data-density", compact ? "normal" : "compact");
    $("#densityBtn").title = compact ? "Toggle compact view" : "Toggle normal view";
  };
  const menuBtn = $("#menuBtn"), sidebar = $("#sidebar"), appEl = $(".app");
  menuBtn.onclick = () => {
    if (appEl.classList.contains("sidebar-collapsed")) {
      appEl.classList.remove("sidebar-collapsed"); // desktop: un-collapse
      sidebar.classList.add("open"); // mobile: also slide in (no-op on desktop)
    } else {
      sidebar.classList.toggle("open"); // mobile: slide in/out
    }
  };
  function closeSidebar() { sidebar.classList.remove("open"); }
  $("#collapseBtn").onclick = () => { appEl.classList.add("sidebar-collapsed"); closeSidebar(); };
  $("#sidebarBackdrop").onclick = closeSidebar;

  // expose for inline onclick handlers
  window.openDeckEditor = openDeckEditor;
  // Turn off the browser's native image-resize handles (Firefox) — they don't lock
  // aspect ratio; our own corner-drag resizer does.
  try { document.execCommand("enableObjectResizing", false, false); } catch (e) {}
  // Flush pending saves when leaving / backgrounding the app (more reliable than
  // beforeunload alone, especially on mobile).
  document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden") flushPersist(); });
  window.addEventListener("pagehide", flushPersist);
  window.addEventListener("beforeunload", flushPersist);

  render();                 // instant first paint from the synchronous cache (if any)
  initPersistence();        // then load authoritatively from internal storage
</script>
</body>
</html>

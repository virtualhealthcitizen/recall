<!DOCTYPE html>
<html lang="en" data-theme="light" data-density="normal">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recall — Flashcards</title>
    <link rel="icon" href="data:," /><!-- empty inline icon: prevents the browser's automatic favicon.ico request, which is blocked on file:// pages -->
    <!-- No external requests: the app uses system fonts so it works fully offline / on a private network. -->
    <style>
        :root {
            --display: "Space Grotesk", system-ui, sans-serif;
            --body: "Inter", system-ui, sans-serif;
            --mono: "JetBrains Mono", ui-monospace, monospace;

            --bg: #f3f4f7;
            --surface: #ffffff;
            --surface-2: #f7f8fa;
            --ink: #1a1d24;
            --ink-soft: #565c6b;
            --ink-faint: #8b91a1;
            --line: #e5e8ee;
            --line-strong: #d4d8e0;
            --accent: #5b53d6;
            --accent-soft: #ece9fc;
            --accent-ink: #4840b8;
            --amber: #f0a93b;
            --amber-soft: #fbecd2;
            --green: #2f9e72;
            --green-soft: #d9f0e5;
            --red: #d6555b;
            --red-soft: #fadddf;
            --radius: 14px;
            --radius-sm: 9px;
            --shadow-1: 0 1px 2px rgba(20,26,40,.06), 0 1px 1px rgba(20,26,40,.04);
            --shadow-2: 0 8px 24px rgba(20,26,40,.10), 0 2px 6px rgba(20,26,40,.06);
            --shadow-card: 0 18px 50px rgba(28,24,90,.18), 0 6px 14px rgba(28,24,90,.10);
        }
        [data-theme="dark"] {
            --bg: #14161c;
            --surface: #1d212b;
            --surface-2: #232834;
            --ink: #eef1f6;
            --ink-soft: #aab2c2;
            --ink-faint: #757d8e;
            --line: #2c323f;
            --line-strong: #39404f;
            --accent: #8b85f0;
            --accent-soft: #2a2848;
            --accent-ink: #b4afff;
            --amber: #f0b85a;
            --amber-soft: #3a2f1c;
            --green: #4cc191;
            --green-soft: #1c3a2d;
            --red: #ec6f75;
            --red-soft: #3a2024;
            --shadow-1: 0 1px 2px rgba(0,0,0,.4);
            --shadow-2: 0 10px 30px rgba(0,0,0,.5);
            --shadow-card: 0 22px 60px rgba(0,0,0,.6), 0 6px 16px rgba(0,0,0,.4);
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: var(--body);
            background: var(--bg);
            color: var(--ink);
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        button { font-family: inherit; cursor: pointer; }
        input, select, textarea { font-family: inherit; }
        ::selection { background: var(--accent-soft); }

        /* ---------- Layout shell ---------- */
        .app { display: grid; grid-template-columns: 264px 1fr; height: 100vh; overflow: hidden; }

        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--line);
            display: flex; flex-direction: column;
            min-height: 0;
        }
        .brand {
            display: flex; align-items: center; gap: 10px;
            padding: 18px 18px 14px;
        }
        .brand-mark {
            width: 30px; height: 30px; border-radius: 8px;
            background: linear-gradient(140deg, var(--accent), #8a7cff);
            display: grid; place-items: center; color: #fff;
            font-family: var(--display); font-weight: 700; font-size: 16px;
            box-shadow: var(--shadow-1);
        }
        .brand-name { font-family: var(--display); font-weight: 700; font-size: 19px; letter-spacing: -.02em; }
        .brand-sub { font-size: 11px; color: var(--ink-faint); font-family: var(--mono); letter-spacing: .04em; margin-top: -2px; }

        .nav { padding: 6px 10px; overflow-y: auto; flex: 1; min-height: 0; }
        .nav-section-label {
            font-size: 11px; text-transform: uppercase; letter-spacing: .09em;
            color: var(--ink-faint); font-weight: 600;
            padding: 14px 10px 6px; display: flex; align-items: center; justify-content: space-between;
        }
        .nav-section-label button {
            border: none; background: none; color: var(--ink-faint); font-size: 16px; line-height: 1;
            padding: 2px 6px; border-radius: 6px;
        }
        .nav-section-label button:hover { background: var(--surface-2); color: var(--accent); }

        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-radius: var(--radius-sm);
            color: var(--ink-soft); font-weight: 500; font-size: 14px;
            border: none; background: none; width: 100%; text-align: left;
        }
        .nav-item:hover { background: var(--surface-2); color: var(--ink); }
        .nav-item.active { background: var(--accent-soft); color: var(--accent-ink); font-weight: 600; }
        .nav-item .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
        .nav-item .count { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
        .nav-item.active .count { color: var(--accent-ink); }
        .nav-deck { padding-left: 30px; font-size: 13px; }

        .sidebar-foot { padding: 12px; border-top: 1px solid var(--line); display: flex; gap: 8px; }

        /* ---------- Main ---------- */
        .main { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
        .topbar {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 26px; border-bottom: 1px solid var(--line);
            background: color-mix(in srgb, var(--surface) 70%, transparent);
            backdrop-filter: blur(8px);
        }
        .search {
            flex: 1; max-width: 420px; display: flex; align-items: center; gap: 8px;
            background: var(--surface-2); border: 1px solid var(--line);
            border-radius: 10px; padding: 8px 12px; color: var(--ink-faint);
        }
        .search input { border: none; background: none; outline: none; color: var(--ink); width: 100%; font-size: 14px; }
        .topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

        .content { flex: 1; overflow-y: auto; padding: 28px; min-height: 0; }
        .content-inner { max-width: 1080px; margin: 0 auto; }

        /* ---------- Buttons ---------- */
        .btn {
            display: inline-flex; align-items: center; gap: 7px;
            border: 1px solid var(--line-strong); background: var(--surface);
            color: var(--ink); padding: 8px 14px; border-radius: 10px;
            font-weight: 600; font-size: 13.5px; transition: .14s; white-space: nowrap;
        }
        .btn:hover { border-color: var(--ink-faint); transform: translateY(-1px); box-shadow: var(--shadow-1); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
        .btn-ghost { border-color: transparent; background: transparent; color: var(--ink-soft); }
        .btn-ghost:hover { background: var(--surface-2); color: var(--ink); box-shadow: none; }
        .btn-icon { padding: 8px; }
        .btn-sm { padding: 6px 10px; font-size: 12.5px; }
        .btn-danger { color: var(--red); border-color: transparent; }
        .btn-danger:hover { background: var(--red-soft); border-color: transparent; }

        /* ---------- Page headers ---------- */
        .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
        .page-title { font-family: var(--display); font-size: 30px; font-weight: 700; letter-spacing: -.025em; margin: 0; }
        .page-sub { color: var(--ink-soft); margin: 4px 0 0; font-size: 14px; }
        .eyebrow { font-family: var(--mono); font-size: 11.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); font-weight: 600; }

        /* ---------- Stat strip ---------- */
        .stat-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 26px; }
        .stat {
            background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
            padding: 16px 18px; box-shadow: var(--shadow-1);
        }
        .stat .num { font-family: var(--display); font-size: 27px; font-weight: 700; letter-spacing: -.02em; }
        .stat .lbl { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }
        .stat.accent .num { color: var(--accent); }
        .stat.amber .num { color: var(--amber); }
        .stat.green .num { color: var(--green); }

        /* ---------- Deck grid ---------- */
        .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .deck-card {
            background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
            padding: 18px 18px 18px 21px; box-shadow: var(--shadow-1); transition: .16s; cursor: pointer;
            display: flex; flex-direction: column; gap: 12px; position: relative; overflow: hidden;
        }
        /* Topic colour stripe down the left edge — decks inherit their subject's colour
           unless given one of their own in the deck editor. */
        .deck-card::before {
            content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
            background: var(--deck-accent, transparent);
        }
        .deck-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-2); border-color: var(--line-strong); }
        .deck-card-top { display: flex; align-items: flex-start; gap: 12px; }
        .deck-card h3 { font-family: var(--display); font-size: 17px; margin: 0 0 2px; letter-spacing: -.01em; }
        .deck-card .desc { font-size: 13px; color: var(--ink-soft); margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .chip {
            display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
            padding: 3px 9px; border-radius: 20px; background: var(--surface-2); color: var(--ink-soft);
        }
        .chip .dot { width: 8px; height: 8px; border-radius: 50%; }
        .deck-card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
        .deck-meta { display: flex; gap: 14px; font-size: 12.5px; color: var(--ink-faint); font-family: var(--mono); }
        .deck-meta b { color: var(--ink-soft); font-weight: 600; }
        .due-badge { color: var(--amber); }

        .ring { --p: 0; width: 46px; height: 46px; flex: none; }
        .ring text { font-family: var(--mono); font-weight: 600; fill: var(--ink-soft); }

        /* ---------- Deck detail ---------- */
        .card-row {
            display: flex; align-items: center; gap: 14px;
            background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-sm);
            padding: 13px 16px; margin-bottom: 9px; box-shadow: var(--shadow-1);
        }
        .card-row:hover { border-color: var(--line-strong); }
        .type-tag {
            font-family: var(--mono); font-size: 10.5px; font-weight: 600; letter-spacing: .04em;
            padding: 3px 7px; border-radius: 6px; text-transform: uppercase; flex: none;
        }
        .type-tag.basic { background: var(--accent-soft); color: var(--accent-ink); }
        .type-tag.fill { background: var(--amber-soft); color: var(--amber); }
        .card-row .preview { flex: 1; min-width: 0; }
        .card-row .preview .q { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-row .preview .a { font-size: 13px; color: var(--ink-faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-row .preview .blank-mini { color: var(--amber); font-weight: 600; border-bottom: 2px solid var(--amber); padding: 0 2px; }
        .row-actions { display: flex; gap: 4px; opacity: .55; }
        .card-row:hover .row-actions { opacity: 1; }

        /* ---------- Empty states ---------- */
        .empty {
            text-align: center; padding: 60px 20px; color: var(--ink-soft);
            border: 1.5px dashed var(--line-strong); border-radius: var(--radius); background: var(--surface);
        }
        .empty .big { font-family: var(--display); font-size: 19px; color: var(--ink); margin-bottom: 6px; }

        /* ---------- Modal ---------- */
        .modal-root { position: fixed; inset: 0; z-index: 60; display: none; }
        .modal-root.open { display: block; }
        .modal-backdrop { position: absolute; inset: 0; background: rgba(15,17,25,.5); backdrop-filter: blur(3px); animation: fade .18s; }
        .modal {
            position: relative; max-width: 620px; margin: 6vh auto; background: var(--surface);
            border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow-2);
            max-height: 88vh; display: flex; flex-direction: column; animation: pop .2s;
        }
        .modal-head { padding: 20px 24px 0; }
        .modal-head h2 { font-family: var(--display); font-size: 20px; margin: 0; letter-spacing: -.01em; }
        .modal-head p { color: var(--ink-soft); font-size: 13.5px; margin: 4px 0 0; }
        .modal-body { padding: 18px 24px; overflow-y: auto; }
        .modal-foot { padding: 14px 24px 20px; display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid var(--line); }
        /* Resizable card editor: drag the bottom-right corner to adjust the window.
           Bounds keep it on-screen; the editors flex to fill the chosen height. */
        .modal.resizable {
            width: 660px; max-width: 96vw; min-width: 320px;
            height: auto; max-height: 92vh; min-height: 340px;
            resize: both; overflow: hidden;
        }
        .modal.resizable > div { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
        .modal.resizable .modal-head, .modal.resizable .modal-foot { flex: 0 0 auto; }
        .modal.resizable .modal-body { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
        .modal.resizable .field { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
        .modal.resizable .field label, .modal.resizable .hint { flex: 0 0 auto; }
        .modal.resizable .rte { flex: 1 1 auto; min-height: 96px; display: flex; flex-direction: column; }
        .modal.resizable .rte-bar { flex: 0 0 auto; }
        .modal.resizable .rte-area { flex: 1 1 auto; max-height: none; }
        @media (max-width: 560px) {
            .modal.resizable { width: 96vw; min-width: 0; resize: vertical; }
        }
        @keyframes fade { from { opacity: 0; } }
        @keyframes pop { from { opacity: 0; transform: translateY(10px) scale(.98); } }

        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); margin-bottom: 6px; }
        .input, .select {
            width: 100%; padding: 10px 12px; border: 1px solid var(--line-strong);
            border-radius: 10px; background: var(--surface-2); color: var(--ink); font-size: 14px; outline: none;
        }
        .input:focus, .select:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-soft); }

        /* type toggle */
        .seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; padding: 3px; gap: 3px; }
        .seg button { border: none; background: none; color: var(--ink-soft); font-weight: 600; font-size: 13px; padding: 7px 14px; border-radius: 7px; }
        .seg button.on { background: var(--surface); color: var(--accent-ink); box-shadow: var(--shadow-1); }

        /* ---------- Rich editor ---------- */
        .rte { border: 1px solid var(--line-strong); border-radius: 10px; overflow: hidden; background: var(--surface-2); }
        .rte:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .rte-bar { display: flex; gap: 2px; padding: 6px; border-bottom: 1px solid var(--line); flex-wrap: wrap; background: var(--surface); }
        .rte-bar button {
            border: none; background: none; color: var(--ink-soft); width: 30px; height: 30px;
            border-radius: 7px; font-size: 14px; display: grid; place-items: center;
            padding: 0; box-sizing: border-box; flex: none; line-height: 1; white-space: nowrap;
        }
        .rte-bar button:hover { background: var(--surface-2); color: var(--ink); }
        .rte-bar button.wide { width: auto; min-width: 30px; padding: 0 10px; gap: 6px; font-size: 12.5px; font-weight: 600; color: var(--amber); display: inline-flex; align-items: center; justify-content: center; }
        /* Toolbar glyphs built from <code>/<b>/<i> must not inherit the page's code
           pill (background + padding) — on Windows that widened the monospace "</>"
           until it wrapped to two lines and knocked the button off-center. */
        .rte-bar button code { background: none; padding: 0; border: 0; border-radius: 0; font-family: var(--mono); font-size: .92em; line-height: 1; }
        .rte-bar button > * { line-height: 1; pointer-events: none; }
        .rte-bar .sep { width: 1px; flex: none; background: var(--line); margin: 4px 3px; align-self: stretch; }
        .rte-area { min-height: 96px; max-height: 240px; overflow-y: auto; padding: 12px 14px; outline: none; font-size: 15px; background: var(--surface); }
        .rte-area:empty::before { content: attr(data-placeholder); color: var(--ink-faint); }
        .rte-area b, .rte-area strong { font-weight: 700; }
        .rte-area ul, .rte-area ol { margin: 6px 0; padding-left: 22px; }

        /* Code snippets — inline and block, in editor + study views */
        code {
            font-family: var(--mono); font-size: .88em;
            background: var(--surface-2); padding: 1px 6px; border-radius: 5px;
        }
        pre {
            background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius-sm);
            padding: 12px 14px; margin: 8px 0; overflow-x: auto; text-align: left;
        }
        pre code {
            background: none; padding: 0; border-radius: 0; font-size: inherit;
            display: block; white-space: pre-wrap; word-break: break-word; line-height: 1.55;
        }
        .face-content code, .fill-prompt code { font-size: .82em; }
        /* Pasted / inserted images — keep them inside the card on every screen. */
        .rte-area img, .face-content img, .fill-prompt img {
            max-width: 100%; height: auto; max-height: 320px;
            border-radius: 10px; display: inline-block; vertical-align: middle;
            margin: 4px 2px; box-shadow: 0 1px 4px rgba(0,0,0,.12);
        }
        /* Editor images: hover affordance; the cursor is driven from JS (the area's
           cursor is inherited) so dragging the bottom-right corner resizes them. */
        .rte-area img:hover { outline: 2px solid var(--accent-soft); outline-offset: 1px; }
        .face-content pre, .fill-prompt pre {
            font-family: var(--mono); font-size: 14px; font-weight: 400;
            max-height: 200px; overflow-y: auto; width: 100%;
        }
        .rte-area pre { background: var(--surface-2); }
        .rte-bar .code-size-wrap {
            display: flex; align-items: center; gap: 4px; margin-left: 2px;
        }
        .rte-bar .code-size-wrap label {
            font-size: 10.5px; color: var(--ink-faint); font-weight: 600; letter-spacing: .03em; white-space: nowrap;
        }
        .code-size-sel {
            font-family: var(--mono); font-size: 11.5px; font-weight: 600;
            background: var(--surface-2); border: 1px solid var(--line); border-radius: 6px;
            color: var(--ink-soft); padding: 3px 4px; outline: none; cursor: pointer;
        }
        .code-size-sel:focus { border-color: var(--accent); }

        .blank {
            background: var(--amber-soft); color: var(--amber); font-weight: 600;
            padding: 1px 7px; border-radius: 6px; border-bottom: 2px solid var(--amber); cursor: pointer; white-space: nowrap;
        }
        /* "×" remove affordance — editor only; purely presentational so it never
           ends up in saved HTML or the answer text. Click anywhere on the pill
           (incl. the icon) to remove the blank. */
        .rte-area .blank::after {
            content: "×"; margin-left: 6px; font-weight: 700; opacity: .55;
        }
        .blank:hover { filter: brightness(.97); }
        .rte-area .blank:hover::after { opacity: 1; color: var(--red); }
        .hint { font-size: 12px; color: var(--ink-faint); margin-top: 7px; line-height: 1.45; }
        .hint code { font-family: var(--mono); background: var(--surface-2); padding: 1px 5px; border-radius: 5px; font-size: 11.5px; }

        /* color swatches */
        .swatches { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .swatch { width: 26px; height: 26px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
        .swatch.on { border-color: var(--ink); box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--ink); }
        /* "custom colour" swatch: a rainbow tile that opens the native colour picker */
        .swatch-custom {
            position: relative; display: grid; place-items: center; overflow: hidden;
            color: #fff; font-weight: 700; font-size: 15px; line-height: 1;
            text-shadow: 0 1px 2px rgba(0,0,0,.45);
            background: conic-gradient(from 0deg, #f54b4b, #f5b04b, #f5f04b, #4bf57a, #4bc7f5, #6a4bf5, #f54bd2, #f54b4b);
        }
        .swatch-custom input[type=color] { position: absolute; inset: 0; opacity: 0; cursor: pointer; border: none; padding: 0; }

        /* live preview in the deck editor — looks like a real deck card but inert */
        .deck-preview { cursor: default; max-width: 320px; }
        .deck-preview:hover { transform: none; box-shadow: var(--shadow-1); border-color: var(--line); }

        /* subjects manager rows */
        .subj-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); }
        .subj-row:last-child { border-bottom: none; }
        .subj-row input { flex: 1; }

        /* ---------- Study mode ---------- */
        .study {
            position: fixed; inset: 0; z-index: 50; display: none;
            flex-direction: column; background: var(--bg);
        }
        .study.open { display: flex; }
        [data-theme="light"] .study { background: radial-gradient(120% 80% at 50% -10%, #ece9fc 0%, #f3f4f7 55%); }
        [data-theme="dark"] .study { background: radial-gradient(120% 80% at 50% -10%, #221f3d 0%, #14161c 55%); }
        .study-top { display: flex; align-items: center; gap: 16px; padding: 16px 24px; }
        .study-top .title { font-family: var(--display); font-weight: 600; }
        .study-top .scope { font-size: 12.5px; color: var(--ink-soft); }
        .progress-track { flex: 1; height: 6px; background: var(--line); border-radius: 4px; overflow: hidden; max-width: 460px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #8a7cff); width: 0%; transition: width .3s; }
        .study-count { font-family: var(--mono); font-size: 12.5px; color: var(--ink-soft); }

        .study-stage { flex: 1; display: grid; place-items: center; padding: 10px 20px 24px; position: relative; }
        .card-wrap { width: min(680px, 92vw); position: relative; }
        .stack-layer { position: absolute; inset: 0; border-radius: 20px; background: var(--surface); border: 1px solid var(--line); }
        .stack-layer.l1 { transform: translateY(14px) scale(.96); opacity: .6; }
        .stack-layer.l2 { transform: translateY(26px) scale(.92); opacity: .35; }

        .flashcard { position: relative; perspective: 1800px; min-height: 340px; }
        .flashcard-inner { position: relative; width: 100%; min-height: 340px; transition: transform .55s cubic-bezier(.2,.8,.2,1); transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .face {
            position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
            background: var(--surface); border: 1px solid var(--line); border-radius: 20px;
            box-shadow: var(--shadow-card); padding: 40px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .face.back { transform: rotateY(180deg); }
        .face-label { position: absolute; top: 18px; left: 22px; font-family: var(--mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-faint); }
        .face-content { font-family: var(--display); font-size: clamp(20px, 3.4vw, 30px); line-height: 1.35; font-weight: 500; max-height: 240px; overflow-y: auto; }
        .face-content.small { font-size: clamp(18px, 2.6vw, 23px); }
        .face-content ul, .face-content ol { text-align: left; display: inline-block; }
        .tap-hint { position: absolute; bottom: 18px; font-size: 12px; color: var(--ink-faint); font-family: var(--mono); }

        /* fill card (no flip) */
        .fill-card {
            background: var(--surface); border: 1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow-card);
            padding: 44px 40px; min-height: 340px; display: flex; flex-direction: column; justify-content: center;
        }
        .fill-prompt { font-family: var(--display); font-size: clamp(19px, 2.8vw, 26px); line-height: 1.7; font-weight: 500; text-align: center; }
        .fill-input {
            font-family: var(--display); font-size: inherit; font-weight: 600; text-align: center;
            border: none; border-bottom: 2px solid var(--accent); background: var(--accent-soft);
            color: var(--accent-ink); border-radius: 6px 6px 0 0; padding: 1px 8px; margin: 0 3px;
            min-width: 90px; max-width: calc(100% - 6px); box-sizing: border-box; outline: none;
        }
        .fill-input:focus { box-shadow: 0 2px 0 var(--accent); }
        .fill-input.correct { background: var(--green-soft); color: var(--green); border-color: var(--green); }
        .fill-input.incorrect { background: var(--red-soft); color: var(--red); border-color: var(--red); }
        .answer-key { text-align: center; margin-top: 22px; font-size: 14px; color: var(--ink-soft); }
        .answer-key .ok { color: var(--green); font-weight: 600; }
        .answer-key b { color: var(--green); font-family: var(--mono); }

        .study-controls { padding: 18px 20px 30px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
        .rate-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .rate {
            display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 92px;
            border: 1px solid var(--line-strong); background: var(--surface); border-radius: 12px;
            padding: 10px 16px; font-weight: 600; color: var(--ink); transition: .14s;
        }
        .rate:hover { transform: translateY(-2px); box-shadow: var(--shadow-1); }
        .rate small { font-size: 11px; color: var(--ink-faint); font-family: var(--mono); font-weight: 500; }
        .rate.again:hover { border-color: var(--red); color: var(--red); }
        .rate.hard:hover { border-color: var(--amber); }
        .rate.good:hover { border-color: var(--accent); color: var(--accent-ink); }
        .rate.easy:hover { border-color: var(--green); color: var(--green); }
        .big-action { display: flex; gap: 12px; }

        .session-done { text-align: center; }
        .session-done .big { font-family: var(--display); font-size: 30px; font-weight: 700; margin-bottom: 8px; }
        .session-done .em { font-size: 46px; }

        /* ---------- Toast ---------- */
        .toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 90; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .toast {
            background: var(--ink); color: var(--bg); padding: 10px 18px; border-radius: 10px;
            font-size: 13.5px; font-weight: 500; box-shadow: var(--shadow-2); animation: toastin .25s;
        }
        @keyframes toastin { from { opacity: 0; transform: translateY(8px); } }

        .session-banner {
            background: var(--amber-soft); color: var(--amber); border: 1px solid color-mix(in srgb, var(--amber) 30%, transparent);
            border-radius: 10px; padding: 9px 14px; font-size: 12.5px; font-weight: 500; margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px;
        }

        @media (max-width: 860px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { position: fixed; inset: 0 auto 0 0; width: 264px; z-index: 40; transform: translateX(-100%); transition: .22s; box-shadow: var(--shadow-2); }
            .sidebar.open { transform: none; }

        /* ---------- Sidebar collapse (desktop) + backdrop (mobile) ---------- */
        .sidebar { transition: transform .22s; }
        .app.sidebar-collapsed { grid-template-columns: 1fr; }
        .app.sidebar-collapsed .menu-btn { display: inline-flex !important; }
        @media (min-width: 861px) {

        .sidebar-collapse-btn {
            border: none; background: none; color: var(--ink-faint); font-size: 15px;

        /* ---------- Compact density ---------- */

<script>
  "use strict";

  /* =========================================================================
     Recall — flashcards. Vanilla JS, single file.
     State is in-memory for the session; use Export / Import to persist.
     ========================================================================= */

  const SUBJECT_COLORS = ["#5b53d6","#2f9e72","#d6555b","#e08a2b","#2b8ad6","#9b51e0","#e05299","#0f9b96"];
  const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3);
  const DAY = 86400000;

  /* ----- State ----- */
  let state = { subjects: [], decks: [] };
  const ui = { view: "dashboard", deckId: null, subjectId: null, search: "" };

  /* ----- Seed sample data so the app is explorable immediately ----- */
  function seed() {
    const sp = { id: uid(), name: "Spanish", color: SUBJECT_COLORS[0] };
    const bio = { id: uid(), name: "Biology", color: SUBJECT_COLORS[1] };
    const cs = { id: uid(), name: "Programming", color: SUBJECT_COLORS[2] };
    const geo = { id: uid(), name: "Geography", color: SUBJECT_COLORS[4] };
    const hist = { id: uid(), name: "History", color: SUBJECT_COLORS[6] };
    const math = { id: uid(), name: "Mathematics", color: SUBJECT_COLORS[7] };
    state.subjects = [sp, bio, cs, geo, hist, math];
    const newSrs = () => ({ due: Date.now(), interval: 0, ease: 2.5, reps: 0, lapses: 0 });
    const deck = (name, subjectId, description, cards) => ({ id: uid(), name, subjectId, description, createdAt: Date.now(), cards });
    const basic = (front, back) => ({ id: uid(), type: "basic", front, back, srs: newSrs() });
    const fill = (prompt) => ({ id: uid(), type: "fill", prompt, srs: newSrs() });
    state.decks = [
      deck("Travel basics", sp.id, "Everyday words and phrases for getting around.", [
        basic("the airport", "<b>el aeropuerto</b>"),
        basic("Where is the station?", "¿Dónde está <b>la estación</b>?"),
        fill('Quiero comprar un <span class="blank" data-answer="billete|boleto">billete</span> de tren.'),
      ]),
      deck("Common Spanish verbs", sp.id, "High-frequency verbs and forms.", [
        basic("to eat", "<b>comer</b>"),
        basic("to have (possess)", "<b>tener</b>"),
        fill('“We speak” is <span class="blank" data-answer="hablamos">hablamos</span>.'),
        fill('The verb <span class="blank" data-answer="ser|estar">ser</span> means “to be”.'),
      ]),
      deck("Cell biology", bio.id, "Organelles and the basics of the cell.", [
        basic("Powerhouse of the cell", "The <b>mitochondrion</b>"),
        fill('The <span class="blank" data-answer="nucleus">nucleus</span> holds the cell\'s genetic material.'),
      ]),
      deck("JavaScript fundamentals", cs.id, "Core language quirks and built-ins.", [
        basic("What does <code>typeof null</code> evaluate to?", '<code>"object"</code> — a long-standing language quirk.'),
        basic("Falsy values in JavaScript", '<ul><li><code>false</code></li><li><code>0</code></li><li><code>""</code> (empty string)</li><li><code>null</code></li><li><code>undefined</code></li><li><code>NaN</code></li></ul>'),
        fill('Add an item to the end of an array with <span class="blank" data-answer="push">push</span>.'),
        fill('<span class="blank" data-answer="const">const</span> declares a block-scoped constant.'),
      ]),
      deck("World capitals", geo.id, "Match countries to their capital cities.", [
        basic("Capital of Japan", "<b>Tokyo</b>"),
        basic("Capital of Australia", '<b>Canberra</b> <span style="color:#888">(not Sydney)</span>'),
        basic("Capital of Canada", "<b>Ottawa</b>"),
        fill('The capital of France is <span class="blank" data-answer="Paris">Paris</span>.'),
        fill('The capital of Egypt is <span class="blank" data-answer="Cairo">Cairo</span>.'),
      ]),
      deck("Ancient Rome", hist.id, "People, places and dates of the Roman world.", [
        basic("Who was the first Roman emperor?", "<b>Augustus</b> (born Octavian)"),
        basic('<div style="text-align:center">Crossing which river in 49 BC began a civil war?</div>', '<div style="text-align:center">The <b>Rubicon</b> — “the die is cast.”</div>'),
        fill('By legend, Rome was founded in <span class="blank" data-answer="753 BC|753 BCE">753 BC</span>.'),
      ]),
      deck("Math quick facts", math.id, "Constants, formulas and mental math.", [
        basic("π to 4 decimal places", "<b>3.1416</b>"),
        basic("Area of a circle", '<div style="text-align:center"><b>A = πr²</b></div>'),
        fill('The square root of 144 is <span class="blank" data-answer="12">12</span>.'),
        fill('Seven times eight is <span class="blank" data-answer="56">56</span>.'),
      ]),
    ];
  }
  /* ----- Persistence: decks live in the browser's own internal storage and are
     restored automatically every time the app opens — no manual import needed.
     IndexedDB is the primary store (ample room, handles images/GIFs); localStorage
     is a best-effort synchronous cache / fallback. The JSON Export/Import feature is
     unchanged and still works for backups and moving data between devices. ----- */
  const STORAGE_KEY = "recall.flashcards.v1";
  const IDB_NAME = "recall.flashcards", IDB_STORE = "state", IDB_KEY = "current";
  let idbOK = typeof indexedDB !== "undefined";
  let lsOK = (() => { try { const k = "__recall_test__"; localStorage.setItem(k, "1"); localStorage.removeItem(k); return true; } catch (e) { return false; } })();
  let lsTooBig = false, booted = false, saveTimer = null;
  function canPersist() { return idbOK || lsOK; }

  function idbOpen() {
    return new Promise((resolve, reject) => {
      let req; try { req = indexedDB.open(IDB_NAME, 1); } catch (e) { return reject(e); }
      req.onupgradeneeded = () => { const db = req.result; if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE); };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
      req.onblocked = () => reject(new Error("blocked"));
    });
  }
  function idbGet() {
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readonly");
      const r = tx.objectStore(IDB_STORE).get(IDB_KEY);
      r.onsuccess = () => { db.close(); resolve(r.result ?? null); };
      r.onerror = () => { db.close(); reject(r.error); };
    }));
  }
  function idbPut(value) {
    return idbOpen().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(value, IDB_KEY);
      tx.oncomplete = () => { db.close(); resolve(true); };
      tx.onerror = () => { db.close(); reject(tx.error); };
      tx.onabort = () => { db.close(); reject(tx.error); };
    }));
  }

  function snapshot() { return { version: 1, savedAt: Date.now(), subjects: state.subjects, decks: state.decks }; }
  function normalizeLoaded(data) {
    if (!data || !Array.isArray(data.decks)) return null;
    data.decks.forEach(d => (d.cards || []).forEach(c => { if (!c.srs) c.srs = { due: Date.now(), interval: 0, ease: 2.5, reps: 0, lapses: 0 }; }));
    return { subjects: Array.isArray(data.subjects) ? data.subjects : [], decks: data.decks };
  }
  function loadLocal() {
    if (!lsOK) return null;
    try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
  }
  function writeLocal(snap) {
    if (!lsOK || lsTooBig) return;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(snap)); } catch (e) { lsTooBig = true; } // too big -> IndexedDB only
  }
  function saveNow() {
    saveTimer = null;
    const snap = snapshot();
    if (idbOK) idbPut(snap).catch(() => { idbOK = false; });
    writeLocal(snap); // synchronous cache for instant next-open restore (small data) + fallback
  }
  // Public auto-save hook; coalesces rapid calls. A no-op until the initial load
  // finishes, so an early render can't overwrite stored data before we've read it.
  function persist() { if (!booted) return; clearTimeout(saveTimer); saveTimer = setTimeout(saveNow, 200); }
  function flushPersist() { if (!booted) return; clearTimeout(saveTimer); saveNow(); }

  /* First paint uses any synchronous localStorage data for an instant restore; the
     authoritative IndexedDB read (initPersistence, below) runs right after and reconciles. */
  const _local = loadLocal();
  if (normalizeLoaded(_local)) state = normalizeLoaded(_local);

  async function initPersistence() {
    let idbData = null;
    if (idbOK) { try { idbData = await idbGet(); } catch (e) { idbOK = false; } }
    // Choose the freshest valid source (IndexedDB vs. the synchronous localStorage read).
    let chosen = null;
    for (const s of [idbData, _local]) if (normalizeLoaded(s) && (!chosen || (s.savedAt || 0) > (chosen.savedAt || 0))) chosen = s;
    if (chosen) state = normalizeLoaded(chosen);
    else if (!state.decks.length) seed();   // nothing stored anywhere -> sample decks
    booted = true;
    render();
    flushPersist();   // migrate old localStorage -> IndexedDB, or persist the seeded samples
  }

  /* ----- Small helpers ----- */
  const $ = (s, r = document) => r.querySelector(s);
  const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls; if (html != null) n.innerHTML = html; return n; };
  const escapeAttr = s => String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");

  function sanitize(html) {
    const t = document.createElement("template");
    t.innerHTML = html || "";
    t.content.querySelectorAll("script,style,iframe,object,embed,link,meta").forEach(n => n.remove());
    t.content.querySelectorAll("*").forEach(node => {
      [...node.attributes].forEach(a => {
        const n = a.name.toLowerCase();
        if (n.startsWith("on")) node.removeAttribute(a.name);
        if ((n === "href" || n === "src") && /^\s*javascript:/i.test(a.value)) node.removeAttribute(a.name);
      });
    });
    return t.content.firstChild ? t.innerHTML : "";
  }
  function plainText(html) { const d = el("div", null, html || ""); return (d.textContent || "").trim(); }
  function fillPreview(html) {
    return (html || "")
      .replace(/<span class="blank"[^>]*>.*?<\/span>/g, '<span class="blank-mini">____</span>')
      .replace(/<img[^>]*>/gi, "🖼");
  }

  /* ----- Images: each deck owns its image store (id -> data URL). Cards keep only
     a lightweight <img data-img-id="…"> reference; the heavy data lives once, per
     deck, and is resolved to a real src at render time. Supports PNG/JP-G/GIF/etc. */
  function deckImages(deck) { if (!deck.images) deck.images = {}; return deck.images; }
  function addDeckImage(deck, dataURL) { const id = uid(); deckImages(deck)[id] = dataURL; return id; }
  function imageSrcById(id) {
    for (const d of state.decks) { if (d.images && d.images[id]) return d.images[id]; }
    return "";
  }
  function hydrateImages(root) {
    root.querySelectorAll("img[data-img-id]").forEach(img => {
      const src = imageSrcById(img.getAttribute("data-img-id"));
      if (src) img.src = src; else img.removeAttribute("src");
    });
  }
  function readFileAsDataURL(file) {
    return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
  }
  function makeImgEl(id, src) {
    const img = document.createElement("img");
    img.className = "rte-img"; img.setAttribute("data-img-id", id); img.alt = "image";
    if (src) img.src = src;
    return img;
  }
  // Drop deck images no longer referenced by any of its cards (e.g. removed/cancelled).
  function pruneDeckImages(deck) {
    if (!deck.images) return;
    const used = new Set();
    deck.cards.forEach(c => {
      const html = (c.front || "") + (c.back || "") + (c.prompt || "");
      const re = /data-img-id="([^"]+)"/g; let m;
      while ((m = re.exec(html))) used.add(m[1]);
    });
    Object.keys(deck.images).forEach(id => { if (!used.has(id)) delete deck.images[id]; });
  }
  // Persist after adding an image; warn once if storage (e.g. quota) can't keep it.
  function persistImage() {
    persist();
    if (!canPersist()) toast("Storage is unavailable here — images and changes won't be kept after you close the app. Use Export for a backup.");
  }
  function insertImageAt(area, img, range) {
    area.focus();
    let r = (range && area.contains(range.commonAncestorContainer)) ? range.cloneRange() : null;
    if (!r) { r = document.createRange(); r.selectNodeContents(area); r.collapse(false); }
    r.collapse(false);
    r.insertNode(img);
    const sel = window.getSelection();
    const after = document.createRange(); after.setStartAfter(img); after.collapse(true);
    sel.removeAllRanges(); sel.addRange(after);
  }
  // Toolbar "insert image" — file picker into the given editor/deck.
  function pickImageInto(area, deck, range) {
    const input = document.createElement("input");
    input.type = "file"; input.accept = "image/*"; input.multiple = true; input.style.display = "none";
    document.body.appendChild(input);
    input.onchange = async () => {
      const files = [...input.files].filter(f => /^image\//.test(f.type));
      let r = range;
      for (const file of files) {
        const dataURL = await readFileAsDataURL(file);
        const img = makeImgEl(addDeckImage(deck, dataURL), dataURL);
        insertImageAt(area, img, r);
        r = document.createRange(); r.setStartAfter(img); r.collapse(true);
        persistImage();
      }
      input.remove();
    };
    input.click();
  }

  function subjectById(id) { return state.subjects.find(s => s.id === id); }
  function deckById(id) { return state.decks.find(d => d.id === id); }
  // A deck shows its own colour if set, otherwise inherits its subject's (the
  // "topic" colour), falling back to a neutral grey for uncategorized decks.
  function deckColor(deck) { return deck.color || subjectById(deck.subjectId)?.color || "#9aa0ad"; }
  function decksInSubject(id) { return state.decks.filter(d => (id === "__uncat" ? !subjectById(d.subjectId) : d.subjectId === id)); }
  function isDue(card) { return (card.srs?.due ?? 0) <= Date.now(); }
  function isMastered(card) { return (card.srs?.reps ?? 0) > 0 && (card.srs?.interval ?? 0) >= 4; }
  function deckStats(deck) {
    const total = deck.cards.length;
    const due = deck.cards.filter(isDue).length;
    const mastered = deck.cards.filter(isMastered).length;
    return { total, due, mastered, pct: total ? Math.round((mastered / total) * 100) : 0 };
  }

  /* ----- Toast ----- */
  function toast(msg) {
    const t = el("div", "toast", msg);
    $("#toastWrap").appendChild(t);
    setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity .3s"; setTimeout(() => t.remove(), 300); }, 1900);
  }

  /* =========================================================================
     Rendering
     ========================================================================= */
  function render() {
    renderSidebar();
    if (ui.view === "deck" && deckById(ui.deckId)) renderDeck();
    else if (ui.view === "subject") renderSubjectView();
    else renderDashboard();
  }

  function renderSidebar() {
    const nav = $("#nav");
    nav.innerHTML = "";
    const allActive = ui.view === "dashboard" ? "active" : "";
    const allItem = el("button", `nav-item ${allActive}`, `<span>▦</span><span>All decks</span><span class="count">${state.decks.length}</span>`);
    allItem.onclick = () => { ui.view = "dashboard"; ui.deckId = null; ui.subjectId = null; render(); closeSidebar(); };
    nav.appendChild(allItem);

    const label = el("div", "nav-section-label", `<span>Subjects</span>`);
    const addSubj = el("button", null, "＋"); addSubj.title = "Manage subjects"; addSubj.onclick = openSubjectsManager;
    label.appendChild(addSubj);
    nav.appendChild(label);

    const groups = state.subjects.map(s => ({ s, decks: decksInSubject(s.id) }));
    const uncat = decksInSubject("__uncat");
    if (uncat.length) groups.push({ s: { id: "__uncat", name: "Uncategorized", color: "#9aa0ad" }, decks: uncat });

    groups.forEach(({ s, decks }) => {
      const active = ui.view === "subject" && ui.subjectId === s.id ? "active" : "";
      const item = el("button", `nav-item ${active}`,
        `<span class="dot" style="background:${s.color}"></span><span>${escapeAttr(s.name)}</span><span class="count">${decks.length}</span>`);
      item.onclick = () => { ui.view = "subject"; ui.subjectId = s.id; ui.deckId = null; render(); closeSidebar(); };
      nav.appendChild(item);
      decks.forEach(d => {
        const da = ui.view === "deck" && ui.deckId === d.id ? "active" : "";
        const di = el("button", `nav-item nav-deck ${da}`, `<span class="dot" style="background:${deckColor(d)}"></span><span>${escapeAttr(d.name)}</span><span class="count">${d.cards.length}</span>`);
        di.onclick = () => { ui.view = "deck"; ui.deckId = d.id; render(); closeSidebar(); };
        nav.appendChild(di);
      });
    });

    if (!state.subjects.length && !state.decks.length) {
      nav.appendChild(el("div", "hint", "<div style='padding:10px'>No decks yet. Create one to begin.</div>"));
    }
    persist(); // renderSidebar runs on every structural change, so this auto-saves
  }

  function ringSVG(pct) {
    const r = 18, c = 2 * Math.PI * r, off = c * (1 - pct / 100);
    return `<svg class="ring" viewBox="0 0 46 46">
    <circle cx="23" cy="23" r="${r}" fill="none" stroke="var(--line)" stroke-width="5"/>
    <circle cx="23" cy="23" r="${r}" fill="none" stroke="var(--accent)" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 23 23)"/>
    <text x="23" y="27" text-anchor="middle" font-size="11">${pct}%</text></svg>`;
  }

  function matchesSearch(deck) {
    const q = ui.search.trim().toLowerCase();
    if (!q) return true;
    if (deck.name.toLowerCase().includes(q) || (deck.description || "").toLowerCase().includes(q)) return true;
    return deck.cards.some(c => {
      const text = c.type === "basic" ? plainText(c.front) + " " + plainText(c.back) : plainText(c.prompt);
      return text.toLowerCase().includes(q);
    });
  }

  function deckCardEl(deck) {
    const st = deckStats(deck);
    const subj = subjectById(deck.subjectId);
    const node = el("div", "deck-card");
    node.style.setProperty("--deck-accent", deckColor(deck));
    node.innerHTML = `
    <div class="deck-card-top">
      <div style="flex:1;min-width:0">
        <h3>${escapeAttr(deck.name)}</h3>
        <span class="chip"><span class="dot" style="background:${subj ? subj.color : "#9aa0ad"}"></span>${escapeAttr(subj ? subj.name : "Uncategorized")}</span>
      </div>
      ${ringSVG(st.pct)}
    </div>
    <p class="desc">${escapeAttr(deck.description || "No description.")}</p>
    <div class="deck-card-foot">
      <div class="deck-meta">
        <span><b>${st.total}</b> cards</span>
        ${st.due ? `<span class="due-badge"><b>${st.due}</b> due</span>` : `<span>all reviewed</span>`}
      </div>
      <button class="btn btn-primary btn-sm" data-study>Study</button>
    </div>`;
    node.onclick = () => { ui.view = "deck"; ui.deckId = deck.id; render(); };
    node.querySelector("[data-study]").onclick = (e) => { e.stopPropagation(); startStudy({ type: "deck", id: deck.id }, "due"); };
    return node;
  }

  function renderDashboard() {
    const v = $("#view");
    v.innerHTML = "";
    const totalCards = state.decks.reduce((n, d) => n + d.cards.length, 0);
    const dueCards = state.decks.reduce((n, d) => n + d.cards.filter(isDue).length, 0);
    const masteredCards = state.decks.reduce((n, d) => n + d.cards.filter(isMastered).length, 0);

    v.appendChild(el("div", "page-head",
      `<div><div class="eyebrow">Dashboard</div><h1 class="page-title">All decks</h1>
      <p class="page-sub">${state.decks.length} deck${state.decks.length === 1 ? "" : "s"} across ${state.subjects.length} subject${state.subjects.length === 1 ? "" : "s"}.</p></div>`));

    v.appendChild(el("div", "session-banner",
      canPersist()
        ? `<span>●</span><span>Saved automatically in this browser. Use <b>Export</b> for a backup you can move between devices.</span>`
        : `<span>●</span><span>Your data lives in this session only. Use <b>Export</b> to save a copy and <b>Import</b> to restore it.</span>`));

    const strip = el("div", "stat-strip");
    strip.innerHTML = `
    <div class="stat"><div class="num">${state.decks.length}</div><div class="lbl">Decks</div></div>
    <div class="stat accent"><div class="num">${totalCards}</div><div class="lbl">Total cards</div></div>
    <div class="stat amber"><div class="num">${dueCards}</div><div class="lbl">Due now</div></div>
    <div class="stat green"><div class="num">${masteredCards}</div><div class="lbl">Mastered</div></div>`;
    v.appendChild(strip);

    const decks = state.decks.filter(matchesSearch);
    if (!decks.length) {
      v.appendChild(el("div", "empty",
        `<div class="big">${state.decks.length ? "No decks match your search" : "Start your first deck"}</div>
       <p>${state.decks.length ? "Try a different term." : "Create a deck, add cards, then study."}</p>
       <div style="margin-top:14px"><button class="btn btn-primary" onclick="openDeckEditor()">＋ New deck</button></div>`));
      return;
    }
    const grid = el("div", "deck-grid");
    decks.forEach(d => grid.appendChild(deckCardEl(d)));
    v.appendChild(grid);
  }

  function renderSubjectView() {
    const subj = ui.subjectId === "__uncat" ? { id: "__uncat", name: "Uncategorized", color: "#9aa0ad" } : subjectById(ui.subjectId);
    if (!subj) { ui.view = "dashboard"; return renderDashboard(); }
    const decks = decksInSubject(subj.id).filter(matchesSearch);
    const v = $("#view");
    v.innerHTML = "";
    const head = el("div", "page-head");
    head.innerHTML = `<div>
      <div class="eyebrow"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${subj.color};margin-right:6px"></span>Subject</div>
      <h1 class="page-title">${escapeAttr(subj.name)}</h1>
      <p class="page-sub">${decks.length} deck${decks.length === 1 ? "" : "s"}.</p></div>
    <div style="display:flex;gap:8px">
      <button class="btn" id="subjStudy">Study subject</button>
      <button class="btn btn-primary" onclick="openDeckEditor(null, '${subj.id === "__uncat" ? "" : subj.id}')">＋ New deck</button>
    </div>`;
    v.appendChild(head);
    $("#subjStudy").onclick = () => startStudy({ type: "subject", id: subj.id }, "due");

    if (!decks.length) {
      v.appendChild(el("div", "empty", `<div class="big">No decks here yet</div><p>Add a deck to this subject to get going.</p>`));
      return;
    }
    const grid = el("div", "deck-grid");
    decks.forEach(d => grid.appendChild(deckCardEl(d)));
    v.appendChild(grid);
  }

  function renderDeck() {
    const deck = deckById(ui.deckId);
    const subj = subjectById(deck.subjectId);
    const st = deckStats(deck);
    const v = $("#view");
    v.innerHTML = "";

    const head = el("div", "page-head");
    head.innerHTML = `
    <div>
      <div class="eyebrow"><span class="dot" style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${deckColor(deck)};margin-right:6px;vertical-align:middle"></span><span style="cursor:pointer" id="bcAll">All decks</span> ›
        <span style="cursor:pointer" id="bcSubj">${escapeAttr(subj ? subj.name : "Uncategorized")}</span></div>
      <h1 class="page-title">${escapeAttr(deck.name)}</h1>
      <p class="page-sub">${escapeAttr(deck.description || "No description.")}</p>
      <div class="deck-meta" style="margin-top:10px">
        <span><b>${st.total}</b> cards</span><span><b>${st.due}</b> due</span><span><b>${st.mastered}</b> mastered</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-icon" id="editDeck" title="Edit deck">✎</button>
      <button class="btn btn-ghost btn-icon btn-danger" id="delDeck" title="Delete deck">🗑</button>
      <button class="btn" id="cramBtn">Cram all</button>
      <button class="btn btn-primary" id="studyDeckBtn">Study due (${st.due})</button>
    </div>`;
    v.appendChild(head);
    $("#bcAll").onclick = () => { ui.view = "dashboard"; render(); };
    $("#bcSubj").onclick = () => { if (subj) { ui.view = "subject"; ui.subjectId = subj.id; render(); } };
    $("#editDeck").onclick = () => openDeckEditor(deck.id);
    $("#delDeck").onclick = () => confirmModal("Delete deck?", `"${deck.name}" and its ${deck.cards.length} card(s) will be removed.`, () => {
      state.decks = state.decks.filter(d => d.id !== deck.id); ui.view = "dashboard"; render(); toast("Deck deleted");
    });
    $("#cramBtn").onclick = () => startStudy({ type: "deck", id: deck.id }, "cram");
    $("#studyDeckBtn").onclick = () => startStudy({ type: "deck", id: deck.id }, "due");

    const addBar = el("div", null);
    addBar.style.cssText = "display:flex;gap:8px;margin-bottom:16px";
    addBar.innerHTML = `<button class="btn btn-primary btn-sm" id="addBasic" title="New basic card (B)">＋ Basic card</button>
                      <button class="btn btn-sm" id="addFill" title="New fill-in-the-blank card (F)">＋ Fill-in-the-blank</button>`;
    v.appendChild(addBar);
    $("#addBasic").onclick = () => openCardEditor(deck.id, null, "basic");
    $("#addFill").onclick = () => openCardEditor(deck.id, null, "fill");

    const q = ui.search.trim().toLowerCase();
    const cards = deck.cards.filter(c => {
      if (!q) return true;
      const text = c.type === "basic" ? plainText(c.front) + " " + plainText(c.back) : plainText(c.prompt);
      return text.toLowerCase().includes(q);
    });

    if (!cards.length) {
      v.appendChild(el("div", "empty", `<div class="big">${deck.cards.length ? "No matching cards" : "This deck is empty"}</div><p>${deck.cards.length ? "Try another search." : "Add a basic or fill-in-the-blank card above."}</p>`));
      return;
    }

    const list = el("div", null);
    cards.forEach(card => {
      const row = el("div", "card-row");
      let preview;
      if (card.type === "basic") {
        preview = `<div class="q">${sanitize(card.front).replace(/<img[^>]*>/gi, "🖼")}</div><div class="a">${plainText(card.back) || (/<img/i.test(card.back) ? "🖼 image" : "")}</div>`;
      } else {
        preview = `<div class="q">${fillPreview(card.prompt)}</div><div class="a">fill-in-the-blank</div>`;
      }
      row.innerHTML = `
      <span class="type-tag ${card.type}">${card.type === "basic" ? "Basic" : "Fill"}</span>
      <div class="preview">${preview}</div>
      <div class="row-actions">
        <button class="btn btn-ghost btn-icon btn-sm" data-edit title="Edit">✎</button>
        <button class="btn btn-ghost btn-icon btn-sm btn-danger" data-del title="Delete">🗑</button>
      </div>`;
      row.querySelector("[data-edit]").onclick = () => openCardEditor(deck.id, card.id);
      row.querySelector("[data-del]").onclick = () => {
        deck.cards = deck.cards.filter(c => c.id !== card.id); pruneDeckImages(deck); render(); toast("Card deleted");
      };
      list.appendChild(row);
    });
    v.appendChild(list);
  }

  /* =========================================================================
     Modals
     ========================================================================= */
  const EDITOR_SIZE_KEY = "recall.editorSize.v1";
  function openModal(node, opts = {}) {
    const m = $("#modal"); m.innerHTML = ""; m.appendChild(node);
    const resizable = !!opts.resizable;
    m.classList.toggle("resizable", resizable);
    m.style.width = ""; m.style.height = "";
    if (resizable) { // restore the user's last chosen size (bounded by CSS max/min)
      try { const s = JSON.parse(localStorage.getItem(EDITOR_SIZE_KEY) || "null"); if (s && s.w) { m.style.width = s.w + "px"; m.style.height = s.h + "px"; } } catch (e) {}
    }
    $("#modalRoot").classList.add("open");
  }
  function closeModal() {
    const m = $("#modal");
    if (m.classList.contains("resizable") && m.style.width) { // remember a size the user dragged to
      try { const r = m.getBoundingClientRect(); localStorage.setItem(EDITOR_SIZE_KEY, JSON.stringify({ w: Math.round(r.width), h: Math.round(r.height) })); } catch (e) {}
    }
    $("#modalRoot").classList.remove("open");
  }
  $("#modalRoot").addEventListener("click", e => { if (e.target.hasAttribute("data-close")) closeModal(); });

  function confirmModal(title, body, onYes) {
    const n = el("div");
    n.innerHTML = `<div class="modal-head"><h2>${escapeAttr(title)}</h2><p>${escapeAttr(body)}</p></div>
    <div class="modal-foot"><button class="btn" data-no>Cancel</button><button class="btn btn-primary" data-yes style="background:var(--red);border-color:var(--red)">Delete</button></div>`;
    n.querySelector("[data-no]").onclick = closeModal;
    n.querySelector("[data-yes]").onclick = () => { closeModal(); onYes(); };
    openModal(n);
  }

  /* ----- Deck editor ----- */
  function openDeckEditor(deckId, presetSubjectId) {
    const editing = deckId ? deckById(deckId) : null;
    const n = el("div");
    const opts = state.subjects.map(s => `<option value="${s.id}" ${editing ? (editing.subjectId === s.id ? "selected" : "") : (presetSubjectId === s.id ? "selected" : "")}>${escapeAttr(s.name)}</option>`).join("");
    n.innerHTML = `
    <div class="modal-head"><h2>${editing ? "Edit deck" : "New deck"}</h2><p>Decks group related cards. Pick a subject and colour to keep things tidy.</p></div>
    <div class="modal-body">
      <div class="field"><label>Deck name</label><input class="input" id="dName" placeholder="e.g. Irregular verbs" value="${editing ? escapeAttr(editing.name) : ""}"/></div>
      <div class="field"><label>Subject</label>
        <div style="display:flex;gap:8px">
          <select class="select" id="dSubj"><option value="">Uncategorized</option>${opts}</select>
          <button class="btn btn-sm" id="dNewSubj">＋ New</button>
        </div>
      </div>
      <div class="field"><label>Colour <span style="color:var(--ink-faint);font-weight:400">— for colour-coding by topic</span></label>
        <div class="swatches" id="dSwatches"></div>
      </div>
      <div class="field"><label>Description <span style="color:var(--ink-faint);font-weight:400">(optional)</span></label>
        <textarea class="input" id="dDesc" rows="2" placeholder="What's in this deck?">${editing ? escapeAttr(editing.description || "") : ""}</textarea></div>
      <div class="field" style="margin-bottom:0"><label>Preview</label><div id="dPreview"></div></div>
    </div>
    <div class="modal-foot"><button class="btn" data-close>Cancel</button><button class="btn btn-primary" id="dSave">${editing ? "Save changes" : "Create deck"}</button></div>`;
    openModal(n);

    // ----- Colour state. A deck without its own colour inherits its subject's, so
    // until the user picks one explicitly we keep the choice in sync with the subject. -----
    const subjColorFor = id => subjectById(id)?.color;
    const startSubj = editing ? editing.subjectId : (presetSubjectId || null);
    let color = editing ? deckColor(editing) : (subjColorFor(startSubj) || SUBJECT_COLORS[0]);
    let colorTouched = editing ? !!editing.color : false;

    const swatchWrap = $("#dSwatches");
    function drawSwatches() {
      const inPalette = SUBJECT_COLORS.includes(color);
      swatchWrap.innerHTML = SUBJECT_COLORS.map(c =>
        `<span class="swatch ${c === color ? "on" : ""}" data-color="${c}" style="background:${c}" title="${c}"></span>`).join("")
        + `<label class="swatch swatch-custom ${inPalette ? "" : "on"}" title="Custom colour"${inPalette ? "" : ` style="background:${color}"`}>
             <input type="color" id="dCustom" value="${color}"/>${inPalette ? "＋" : ""}
           </label>`;
      swatchWrap.querySelectorAll(".swatch[data-color]").forEach(sw =>
        sw.onclick = () => { color = sw.dataset.color; colorTouched = true; drawSwatches(); drawPreview(); });
      $("#dCustom").oninput = e => { color = e.target.value; colorTouched = true; drawSwatches(); drawPreview(); };
    }

    const preview = $("#dPreview");
    function drawPreview() {
      const name = $("#dName").value.trim() || "Untitled deck";
      const subj = subjectById($("#dSubj").value);
      const desc = $("#dDesc").value.trim() || "No description.";
      preview.innerHTML = `<div class="deck-card deck-preview" style="--deck-accent:${color}">
        <div class="deck-card-top"><div style="flex:1;min-width:0">
          <h3>${escapeAttr(name)}</h3>
          <span class="chip"><span class="dot" style="background:${subj ? subj.color : "#9aa0ad"}"></span>${escapeAttr(subj ? subj.name : "Uncategorized")}</span>
        </div></div>
        <p class="desc">${escapeAttr(desc)}</p></div>`;
    }

    // Follow the subject's colour until the user overrides it.
    function syncColorToSubject() {
      if (colorTouched) return;
      const c = subjColorFor($("#dSubj").value);
      if (c) { color = c; drawSwatches(); }
    }

    drawSwatches();
    drawPreview();
    $("#dName").focus();
    $("#dName").addEventListener("input", drawPreview);
    $("#dDesc").addEventListener("input", drawPreview);
    $("#dSubj").onchange = () => { syncColorToSubject(); drawPreview(); };

    $("#dNewSubj").onclick = () => openSubjectsManager(() => {
      const sel = $("#dSubj");
      sel.innerHTML = `<option value="">Uncategorized</option>` + state.subjects.map(s => `<option value="${s.id}">${escapeAttr(s.name)}</option>`).join("");
      if (state.subjects.length) sel.value = state.subjects[state.subjects.length - 1].id;
      syncColorToSubject(); drawPreview();
    });

    function save() {
      const name = $("#dName").value.trim();
      if (!name) { toast("Give the deck a name"); $("#dName").focus(); return; }
      const subjectId = $("#dSubj").value || null;
      const description = $("#dDesc").value.trim();
      if (editing) { Object.assign(editing, { name, subjectId, description, color }); toast("Deck updated"); }
      else {
        const d = { id: uid(), name, subjectId, description, color, createdAt: Date.now(), cards: [] };
        state.decks.push(d); ui.view = "deck"; ui.deckId = d.id; toast("Deck created");
      }
      closeModal(); render();
    }
    $("#dSave").onclick = save;
    // Enter in the name field, or Ctrl/Cmd+Enter anywhere, commits; Esc cancels.
    $("#dName").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); save(); } });
    n.addEventListener("keydown", e => {

  }
